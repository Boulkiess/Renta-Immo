<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImmoRenta — Analyse Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020817;--surface:#0f172a;--s2:#0d1b2a;--border:#1e293b;
  --text:#e2e8f0;--muted:#64748b;--subtle:#334155;
  --a:#6C9AFF;--b:#FF9D5C;--c:#5CEFB0;
  --red:#f87171;--green:#4ade80;--yellow:#fbbf24;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;overflow-x:hidden;min-height:100vh}

/* Number input spinners — styled to match theme */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{opacity:1;height:16px;cursor:pointer}
input[type=number]{-moz-appearance:textfield}

.nav{position:sticky;top:0;z-index:200;background:#070f1e;border-bottom:1px solid var(--border);height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 16px}
.nav-brand{display:flex;align-items:center;gap:8px;font-weight:800;font-size:14px;white-space:nowrap}
.badge{font-size:9px;color:var(--muted);background:var(--border);padding:2px 7px;border-radius:20px;font-weight:600}
.tabs{display:flex;gap:3px;flex-wrap:wrap}
.tab{padding:5px 10px;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;transition:all .15s;white-space:nowrap}
.tab.active{background:#1e40af;color:#93c5fd}
.tab:not(.active){background:transparent;color:var(--muted)}
.tab:not(.active):hover{background:var(--border);color:var(--text)}

/* Global strip */
.gs{background:var(--surface);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:11px}
.gs-t{font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-right:4px;white-space:nowrap;font-size:10px}
.gf{display:flex;align-items:center;gap:5px;background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:3px 8px}
.gl{color:var(--muted);white-space:nowrap;font-size:10px}
.gi{width:50px;background:transparent;border:none;outline:none;font-family:inherit;font-size:11px;font-weight:700;color:#fbbf24;text-align:right;padding:0}
.gu{font-size:9px;color:var(--muted);white-space:nowrap}
.gd{width:1px;height:16px;background:var(--border);margin:0 2px}

/* Layout */
.layout{display:grid;grid-template-columns:repeat(3,272px) 1fr;gap:10px;padding:10px 12px;max-width:1900px;margin:0 auto}

/* Sim Panel */
.sp{background:var(--surface);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;height:calc(100vh - 106px);position:sticky;top:98px;transition:opacity .25s}
.sp.off{opacity:.35}
.sp.off .sb{pointer-events:none}
.sp.off .sh{filter:grayscale(.7)}
.sh{padding:10px 12px;flex-shrink:0}
.sh-top{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.sh-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sh-name{background:transparent;border:none;outline:none;font-family:inherit;font-size:13px;font-weight:700;cursor:text;width:100%;padding:0}
/* toggle switch */
.tgl{position:relative;width:32px;height:18px;flex-shrink:0;cursor:pointer}
.tgl input{display:none}
.tgl .track{position:absolute;inset:0;border-radius:9px;background:var(--subtle);transition:background .2s}
.tgl input:checked+.track{background:#1e40af}
.tgl .knob{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#e2e8f0;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.4)}
.tgl input:checked~.knob{transform:translateX(14px)}
/* mode switcher (RP/LOC) */
.mode-sw{display:flex;border-radius:6px;overflow:hidden;border:1px solid var(--border);font-size:10px;font-weight:700}
.mode-btn{padding:3px 10px;cursor:pointer;border:none;font-family:inherit;font-size:10px;font-weight:700;transition:all .15s;background:transparent;color:var(--muted)}
.mode-btn.active{color:#fff}
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:6px}
.kc{background:var(--bg);border-radius:6px;padding:3px 7px}
.kl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.kv{font-size:11px;font-weight:700;margin-top:1px;transition:color .2s}
.sb{overflow-y:auto;flex:1;overscroll-behavior:contain}
.sb::-webkit-scrollbar{width:3px}
.sb::-webkit-scrollbar-thumb{background:var(--subtle);border-radius:2px}

.gb{width:100%;background:none;border:none;display:flex;justify-content:space-between;align-items:center;padding:6px 12px;color:var(--text);cursor:pointer;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;font-family:inherit;transition:background .1s}
.gb:hover{background:var(--border)}
.gc{padding:2px 11px 6px}
.fr{margin-bottom:7px}
.ft{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;gap:4px}
.fl{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:3px;flex:1;min-width:0}
.fl span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ib{width:13px;height:13px;border-radius:50%;background:var(--border);border:none;color:var(--muted);font-size:8px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'DM Sans',sans-serif;font-weight:800;line-height:1;transition:background .15s,color .15s;vertical-align:middle}
.ib:hover{background:#334155;color:var(--text)}
.fw{display:flex;align-items:center;gap:3px;flex-shrink:0}
.ni{width:60px;background:var(--s2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:inherit;font-size:10px;font-weight:700;padding:2px 5px;text-align:right;outline:none;transition:border-color .15s}
.ni:focus{border-color:#475569}
input[type=range]{width:100%;cursor:pointer;height:4px;border-radius:2px;-webkit-appearance:none;appearance:none;background:var(--border);display:block;margin:0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;cursor:grab;border:2px solid var(--bg);box-shadow:0 0 4px rgba(0,0,0,.6)}
input[type=range]:active::-webkit-slider-thumb{cursor:grabbing;transform:scale(1.15)}
input[type=range]::-moz-range-thumb{width:12px;height:12px;border-radius:50%;cursor:grab;border:2px solid var(--bg)}
input[type=range]:focus{outline:none}

/* Content */
.content{display:flex;flex-direction:column;gap:10px;min-width:0}
.lb{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 14px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;cursor:pointer;user-select:none;transition:opacity .2s}
.li.off{opacity:.3;text-decoration:line-through}
.ll{width:20px;height:3px;border-radius:2px;transition:background .2s}
.cc{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 12px}
.ct{font-size:13px;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:7px}
.cs{font-size:10px;color:var(--muted);margin-bottom:10px;line-height:1.5;border-left:2px solid var(--border);padding-left:8px}
canvas{display:block;width:100%}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:6px 10px;color:var(--muted);border-bottom:1px solid var(--border);font-weight:600;font-size:10px}
td{padding:7px 10px;font-size:11px}
tr:nth-child(even) td{background:var(--s2)}
.tr{text-align:right;font-weight:700}

.tip{position:fixed;background:#070f1e;border:1px solid #334155;border-radius:9px;padding:8px 12px;font-size:11px;pointer-events:none;display:none;z-index:999;min-width:170px;box-shadow:0 4px 24px rgba(0,0,0,.7)}
.tip-y{color:#94a3b8;font-weight:700;margin-bottom:4px;border-bottom:1px solid var(--border);padding-bottom:3px;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.tip-r{display:flex;justify-content:space-between;gap:12px;margin-top:2px;align-items:center}
.tip-d{width:7px;height:7px;border-radius:50%;flex-shrink:0}

.pop{position:fixed;background:#0a1628;border:1px solid #334155;border-radius:10px;padding:12px 14px;font-size:11px;line-height:1.6;color:#94a3b8;max-width:280px;z-index:600;box-shadow:0 8px 32px rgba(0,0,0,.8);display:none;pointer-events:none}
.pop h4{color:var(--text);font-size:12px;margin-bottom:5px;font-weight:700}
.pop code{display:block;background:var(--border);border-radius:4px;padding:3px 8px;font-family:monospace;font-size:10px;color:#fbbf24;margin-top:6px}

.rg{display:grid;grid-template-columns:50px repeat(3,1fr);gap:4px;margin-bottom:6px;align-items:start}
.rc{border-radius:7px;padding:6px 8px}
.yb{font-size:10px;color:var(--muted);font-weight:700;padding-top:5px}
.am-lg{display:flex;gap:10px;font-size:10px;color:var(--muted);margin-bottom:4px}
.am-d{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:3px;vertical-align:middle}
.exp-opt{display:block;width:100%;background:transparent;border:none;color:var(--text);font-family:inherit;font-size:11px;font-weight:600;padding:6px 10px;border-radius:5px;cursor:pointer;text-align:left;white-space:nowrap;transition:background .1s}
.exp-opt:hover{background:var(--border)}
</style>
</head>
<body>
<div class="nav">
  <div class="nav-brand"><span>🏠</span><span>ImmoRenta</span><span class="badge">ANALYSE PRO v3</span></div>
  <div class="tabs" id="tabs"></div>
  <div style="position:relative;flex-shrink:0;margin-left:6px" id="exp-wrap">
    <button onclick="toggleExpMenu()" style="background:var(--border);border:1px solid var(--subtle);border-radius:6px;color:var(--muted);font-family:inherit;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;display:flex;align-items:center;gap:4px">↓ Export <span id="exp-arr" style="font-size:9px;display:inline-block;transition:transform .15s">▾</span></button>
    <div id="exp-menu" style="display:none;position:absolute;right:0;top:calc(100% + 4px);background:#0a1628;border:1px solid #334155;border-radius:8px;padding:4px;z-index:300;box-shadow:0 8px 24px rgba(0,0,0,.8)">
      <button class="exp-opt" onclick="doExport('csv')">📊 CSV</button>
      <button class="exp-opt" onclick="doExport('json')">{ } JSON</button>
      <button class="exp-opt" onclick="doExport('yaml')">📄 YAML</button>
    </div>
  </div>
  <button onclick="document.getElementById('imp-in').click()" style="background:var(--border);border:1px solid var(--subtle);border-radius:6px;color:var(--muted);font-family:inherit;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;flex-shrink:0;margin-left:4px">↑ Import</button>
  <input type="file" id="imp-in" accept=".json,.yaml,.yml,.csv" style="display:none" onchange="handleImport(this)">
</div>
<div class="gs" id="gs"></div>
<div class="layout">
  <div id="pA" class="sp"></div>
  <div id="pB" class="sp"></div>
  <div id="pC" class="sp"></div>
  <div class="content">
    <div class="lb" id="legend"></div>
    <div id="area"></div>
  </div>
</div>
<div class="tip" id="tip"></div>
<div class="pop" id="pop"></div>
<script>
// ══════════════════════════════════════════════════════════
// INFO REGISTRY
// ══════════════════════════════════════════════════════════
const I={
inflation:{t:"Inflation (IPC)",b:"Utilisé pour relativiser les performances en euros constants. N'affecte pas les flux nominaux calculés."},
regime:{t:"Régime fiscal locatif",b:"<b>LMNP Réel</b> : amortissements déductibles (bien + travaux).<br><b>Micro-BIC</b> : abattement 50%.<br><b>Foncier nu réel</b> : charges réelles, sans amortissement."},
tauxActu:{t:"Taux d'actualisation (VAN)",b:"Taux utilisé pour calculer la Valeur Actuelle Nette. Représente le coût d'opportunité du capital — typiquement le rendement attendu d'un placement alternatif."},
rendAlt:{t:"Rendement ETF / placement alternatif",b:"Rendement annuel net du portefeuille ETF. Utilisé pour capitaliser le surplus mensuel investi dans <b>tous les scénarios</b> (loc, RP, ETF pur). Historiquement ~7-8% brut ETF World, ~5-6% net après impôts et inflation."},
budgetMensuel:{t:"Budget mensuel logement+investissement",b:"Enveloppe mensuelle fixe disponible pour se loger <b>et</b> investir. Le surplus non consommé par les coûts réels (mensualité, loyer perso, charges…) est automatiquement investi en ETF. Permet une comparaison équitable entre tous les scénarios sur la même base de sacrifice mensuel."},
investirSurplus:{t:"Investir le surplus en ETF",b:"Si activé : chaque mois, la différence entre le budget mensuel et les sorties réelles est investie en ETF au taux 'Rdt placement alternatif'.<br>Cela normalise la comparaison : chaque scénario utilise la même enveloppe mensuelle, l'argent non dépensé en immo va en ETF.<br>Le tiret représente le scénario <b>ETF pur</b> : même apport + même surplus investi sans aucun achat immobilier."},
prixAchat:{t:"Prix d'achat net vendeur",b:"Prix payé au vendeur, hors frais.",code:"Rendement brut = Loyer×12 / Coût total"},
fraisNotaire:{t:"Frais de notaire",b:"7-8% dans l'ancien, 2-3% dans le neuf."},
travaux:{t:"Travaux de rénovation",b:"En LMNP Réel, amortissables sur plusieurs années.",code:"Amort. travaux = Travaux × Taux amort."},
fraisAgence:{t:"Frais d'agence acheteur",b:"Honoraires d'agence à charge de l'acheteur."},
apport:{t:"Apport personnel",b:"Capital propre investi. Réduit le montant emprunté mais aussi le levier."},
taux:{t:"Taux d'intérêt nominal",b:"Taux nominal du prêt.",code:"Mensualité = K×(τ/12)/(1−(1+τ/12)^−n)"},
duree:{t:"Durée du prêt",b:"Plus long = mensualité plus faible mais coût total plus élevé."},
assurance:{t:"Assurance emprunteur (ADI)",b:"0.10-0.40%/an du capital selon profil.",code:"Assurance mens. = Capital × taux / 12"},
revalBien:{t:"Revalorisation du bien",b:"Hypothèse de hausse annuelle. ~2-3%/an historique en France.",code:"Valeur an N = Prix × (1+taux)^N"},
fraisVente:{t:"Frais d'agence vente",b:"3-7% du prix de vente. Négociable ou évitable en PAP."},
loyer:{t:"Loyer mensuel brut",b:"Hors charges récupérables. Levier n°1 de la rentabilité.",code:"Rdt brut = Loyer×12 / Coût total"},
vacance:{t:"Vacance locative",b:"5-8% en zone tendue, 10-15% en zone rurale.",code:"Loyer encaissé = Loyer brut × (1−vacance)"},
taxeFonciere:{t:"Taxe foncière",b:"Impôt local annuel. Varie fortement selon la commune."},
chargesCopro:{t:"Charges copro non récupérables",b:"Restent à charge du propriétaire."},
assurPNO:{t:"Assurance PNO",b:"Obligatoire en copropriété. 100-300€/an."},
fraisGestion:{t:"Gestion locative",b:"6-9% TTC des loyers encaissés si agence."},
provision:{t:"Provision travaux",b:"Épargne de précaution. Règle : ~1% valeur/an."},
revalLoyer:{t:"Revalorisation loyer",b:"Plafonnée à l'IRL. 1-4%/an selon inflation.",code:"Loyer an N = Loyer × (1+taux)^(N−1)"},
tmi:{t:"TMI",b:"Tranche marginale : 0%, 11%, 30%, 41% ou 45%.",code:"Impôts = Rev. imposable × (TMI+PS)"},
ps:{t:"Prélèvements sociaux",b:"17.2% sur les revenus fonciers (CSG+CRDS+solidarité)."},
amortBien:{t:"Amortissement bien",b:"LMNP Réel uniquement. Typique 25-40 ans → 2.5-4%/an."},
amortTravaux:{t:"Amortissement travaux",b:"LMNP Réel. Typique 7-10 ans → 10-14%/an."},
impotPV:{t:"Impôt plus-value",b:"19% IR + 17.2% PS = 36.2%. Abattements progressifs. RP exonérée."},
psPV:{t:"PS sur plus-value",b:"17.2%. Exonération totale après 30 ans."},
loyerPerso:{t:"Loyer actuel (que vous payez)",b:"Le loyer mensuel que vous payez pour vous loger. En mode locatif : soustrait du CF pour comparer à situation équivalente. En mode RP : c'est l'économie réalisée si vous achetez.",code:"CF réel (loc) = CF locatif − Loyer perso\nÉconomie (RP) = Loyer perso − Mensualité"},
revalLoyerPerso:{t:"Revalorisation loyer marché %/an",b:"Hausse annuelle de votre loyer. Sert à projeter l'économie future (RP) et le coût futur (locatif). ~1-3%/an indexé IRL."},
assurHab:{t:"Assurance habitation",b:"Assurance multirisque habitation propriétaire occupant. 200-500€/an."},
chargesCoproRP:{t:"Charges copropriété RP",b:"Totalité des charges (pas de distinction récupérable/non). 50-200€/mois."},
taxeFonciereRP:{t:"Taxe foncière RP",b:"Même impôt que pour un locatif. Pas de taxe d'habitation depuis 2023 pour les RP."},
provisionRP:{t:"Provision travaux RP",b:"Budget annuel pour l'entretien. ~1% de la valeur du bien."},
};

// ══════════════════════════════════════════════════════════
// GLOBALS
// ══════════════════════════════════════════════════════════
const G={inflation:2,regime:'lmnp',horizon:20,tauxActu:3,rendAlt:6,loyerPerso:900,revalLoyerPerso:2,budgetMensuel:2500,investirSurplus:true};
const COL={A:'#6C9AFF',B:'#FF9D5C',C:'#5CEFB0'};
const KEYS=['A','B','C'];

function mkDef(mode){
  return{
    mode, // 'loc' or 'rp'
    enabled:true,
    label:mode==='loc'?'Locatif':'Résidence principale',
    prixAchat:250000,fraisNotaire:20000,travaux:15000,fraisAgence:0,apport:50000,
    taux:3.85,duree:20,assurance:0.25,
    revalBien:2.0,fraisVente:4,
    // LOC only
    loyer:1000,vacance:5,taxeFonciere:1200,chargesCopro:800,assurPNO:200,
    fraisGestion:7,provision:500,revalLoyer:1.5,
    tmi:30,ps:17.2,amortBien:2.5,amortTravaux:10,
    impotPV:19,psPV:17.2,
    // RP only
    taxeFonciereRP:1200,chargesCoproRP:1200,assurHab:300,provisionRP:500,
  };
}
const sims={
  A:{...mkDef('loc'),label:'Locatif — Centre-ville',prixAchat:280000,fraisNotaire:22000,loyer:1050,apport:60000},
  B:{...mkDef('rp'),label:'RP — Achat appart',prixAchat:320000,fraisNotaire:25000,apport:70000},
  C:{...mkDef('loc'),label:'Locatif — Périphérie',prixAchat:180000,fraisNotaire:14000,loyer:750,apport:35000,taux:3.5,duree:15},
};
let curTab='charts';
const openGrp={A:'Acquisition',B:'Acquisition',C:'Acquisition'};

// ══════════════════════════════════════════════════════════
// COMPUTE
// ══════════════════════════════════════════════════════════
function compute(p){
  const ct=p.prixAchat+p.fraisNotaire+p.travaux+p.fraisAgence;
  const emp=Math.max(0,ct-p.apport);
  const tM=(p.taux/100)/12, nM=p.duree*12;
  const mens=emp>0&&tM>0?emp*tM/(1-Math.pow(1+tM,-nM)):(emp>0?emp/nM:0);
  const assM=emp*(p.assurance/100)/12;

  const amort=[];let cap=emp;
  for(let m=1;m<=Math.max(nM,12);m++){
    const inter=cap*tM,capM=Math.max(0,mens-inter);
    cap=Math.max(0,cap-capM);amort.push({inter,cap:capM,assur:assM,rest:cap});
  }

  function impLoc(le,chg,ab,at,tmi,ps){
    let ri;
    if(G.regime==='lmnp')ri=Math.max(0,le-chg-ab-at);
    else if(G.regime==='microbic')ri=Math.max(0,le*.5);
    else ri=Math.max(0,le-chg);
    return ri*((tmi+ps)/100);
  }

  const ab=p.prixAchat*(p.amortBien/100),at=p.travaux*(p.amortTravaux/100);
  const flux=[];let cfC=0;
  const irrFlows=[-p.apport];
  const rAlt=G.rendAlt/100;
  let etfCap=0,etfPurCap=p.apport;
  const etfPur=[];

  for(let yr=1;yr<=30;yr++){
    const mi=Math.min(yr*12,amort.length)-1;
    const rest=amort[mi]?.rest??0;
    const ann=yr<=p.duree?mens*12:0,asp=yr<=p.duree?assM*12:0;
    const vb=p.prixAchat*Math.pow(1+p.revalBien/100,yr);
    const loyerPersoAnn=G.loyerPerso*12*Math.pow(1+G.revalLoyerPerso/100,yr-1);

    let cfN,le=0,chg=0,imp=0;

    if(p.mode==='loc'){
      const lb=p.loyer*12*Math.pow(1+p.revalLoyer/100,yr-1);
      le=lb*(1-p.vacance/100);
      chg=p.taxeFonciere+p.chargesCopro+p.assurPNO+p.provision+lb*(p.fraisGestion/100);
      imp=impLoc(le,chg,ab,at,p.tmi,p.ps);
      cfN=le-chg-ann-asp-imp-loyerPersoAnn;
    } else {
      chg=p.taxeFonciereRP+p.chargesCoproRP+p.assurHab+p.provisionRP;
      cfN=loyerPersoAnn-chg-ann-asp;
      le=loyerPersoAnn;
    }
    cfC+=cfN;

    // Sortie réelle de trésorerie (hors notion de loyer économisé)
    const realOutAnn=p.mode==='loc'?-cfN:chg+ann+asp;
    const surplusAnn=Math.max(0,G.budgetMensuel*12-realOutAnn);
    etfCap=etfCap*(1+rAlt)+(G.investirSurplus?surplusAnn:0);

    // ETF pur : même apport investi + surplus (budget - loyer perso) chaque année
    const surplusEtfPur=Math.max(0,G.budgetMensuel*12-loyerPersoAnn);
    etfPurCap=etfPurCap*(1+rAlt)+(G.investirSurplus?surplusEtfPur:0);
    etfPur.push({yr,cap:etfPurCap,surplus:surplusEtfPur});

    // Revente
    const pr=(p.prixAchat+p.travaux)*Math.pow(1+p.revalBien/100,yr);
    const fa=pr*(p.fraisVente/100);
    const pvB=Math.max(0,pr-p.prixAchat-p.travaux);
    let iPV=0;
    if(p.mode==='loc') iPV=pvB*((p.impotPV+p.psPV)/100);
    const reventeNet=pr-rest-fa-iPV;
    const bilanRevente=reventeNet+cfC-p.apport;
    const patTotal=(vb-rest)+etfCap;

    flux.push({yr,le,chg,ann:ann+asp,imp,cfN,cfC,vb,rest,
      patNet:vb-rest+cfC-p.apport,
      patTotal,etfPoche:etfCap,
      reventeNet,bilanRevente,pr});

    irrFlows.push(cfN);
  }

  function calcTRI(horizon){
    if(horizon>30||horizon<1)return null;
    const flows=[...irrFlows.slice(0,horizon+1)];
    flows[horizon]+=flux[horizon-1].reventeNet;
    return irr(flows);
  }

  const totInt=amort.reduce((s,m)=>s+m.inter,0);
  const totAss=amort.reduce((s,m)=>s+m.assur,0);
  const rendBrut=p.mode==='loc'?(p.loyer*12/ct)*100:0;
  let rendNet=0;
  if(p.mode==='loc'){
    const lnA=p.loyer*(1-p.vacance/100)*12-(p.taxeFonciere+p.chargesCopro+p.assurPNO+p.provision+p.loyer*12*(p.fraisGestion/100));
    rendNet=(lnA/ct)*100;
  }
  const cfM=p.mode==='loc'?p.loyer-mens-assM-G.loyerPerso:G.loyerPerso-mens-assM;
  const be=flux.findIndex(f=>f.cfC>=0);

  function calcVAN(horizon){
    const r=G.tauxActu/100;
    let van=-p.apport;
    for(let t=1;t<=horizon&&t<=30;t++){
      let cf=flux[t-1].cfN;
      if(t===horizon)cf+=flux[t-1].reventeNet;
      van+=cf/Math.pow(1+r,t);
    }
    return van;
  }

  return{ct,emp,mens,assM,totInt,totAss,rendBrut,rendNet,cfM,
    be:be>=0?be+1:null,flux,amort,etfPur,
    tri10:calcTRI(10),tri15:calcTRI(15),tri20:calcTRI(20),
    van:calcVAN(G.horizon),
    moic:flux[G.horizon-1]?(flux[G.horizon-1].bilanRevente+p.apport)/p.apport:0,
    revente:flux.map(f=>({yr:f.yr,pr:f.pr,rest:f.rest,bilanRevente:f.bilanRevente})),
  };
}

// Newton-Raphson IRR
function irr(flows,guess=0.1,maxIter=100,tol=1e-7){
  let r=guess;
  for(let i=0;i<maxIter;i++){
    let npv=0,dnpv=0;
    for(let t=0;t<flows.length;t++){
      const d=Math.pow(1+r,t);
      npv+=flows[t]/d;
      if(t>0)dnpv-=t*flows[t]/Math.pow(1+r,t+1);
    }
    if(Math.abs(dnpv)<1e-15)return null;
    const nr=r-npv/dnpv;
    if(Math.abs(nr-r)<tol)return nr;
    r=nr;
    if(!isFinite(r)||r<-1)return null;
  }
  return null;
}

// crossover year: when patTotal (immo + ETF poche) surpasses etfPur
function crossoverYear(res){
  if(!res.etfPur||!G.investirSurplus)return null;
  for(let i=0;i<30;i++){
    const immo=res.flux[i]?.patTotal;
    const etf=res.etfPur[i]?.cap;
    if(immo!=null&&etf!=null&&immo>=etf)return i+1;
  }
  return null;
}

const fmtE=v=>new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(v||0);
const fmtK=v=>{if(v==null||!isFinite(v))return'—';const a=Math.abs(v);return a>=1e6?(v/1e6).toFixed(2)+'M€':a>=1e3?(v/1e3).toFixed(0)+'k€':Math.round(v)+'€';};
const fmtP=v=>(!isFinite(v)||isNaN(v))?'—':v.toFixed(2)+'%';
const fmtTRI=v=>v===null?'N/C':(v*100).toFixed(2)+'%';

function drawLine(id,datasets,xLabels){
  const el=document.getElementById(id);if(!el)return;
  const W=el.offsetWidth||600,H=parseInt(el.dataset.h)||220,dpr=devicePixelRatio||1;
  el.width=W*dpr;el.height=H*dpr;el.style.height=H+'px';
  const ctx=el.getContext('2d');ctx.scale(dpr,dpr);
  const p={l:60,r:14,t:12,b:26},cW=W-p.l-p.r,cH=H-p.t-p.b;
  const all=datasets.filter(d=>!d.hide).flatMap(d=>d.data.filter(v=>v!=null&&isFinite(v)));
  if(!all.length){ctx.fillStyle='#0f172a';ctx.fillRect(0,0,W,H);return;}
  let mn=Math.min(...all),mx=Math.max(...all);const rng=mx-mn||1;mn-=rng*.07;mx+=rng*.07;
  const xS=i=>p.l+(i/Math.max(xLabels.length-1,1))*cW;
  const yS=v=>p.t+cH-((v-mn)/(mx-mn))*cH;
  ctx.fillStyle='#0f172a';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#1e293b';ctx.lineWidth=1;
  for(let i=0;i<=5;i++){const y=p.t+(i/5)*cH;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(W-p.r,y);ctx.stroke();ctx.fillStyle='#4b5563';ctx.font="10px 'DM Sans',sans-serif";ctx.textAlign='right';ctx.fillText(fmtK(mx-(i/5)*(mx-mn)),p.l-4,y+3.5);}
  const step=Math.max(1,Math.ceil(xLabels.length/10));ctx.fillStyle='#4b5563';ctx.textAlign='center';
  xLabels.forEach((l,i)=>{if(i%step===0||i===xLabels.length-1)ctx.fillText(l,xS(i),H-5);});
  if(mn<0&&mx>0){const y0=yS(0);ctx.strokeStyle='#334155';ctx.lineWidth=1.5;ctx.setLineDash([5,3]);ctx.beginPath();ctx.moveTo(p.l,y0);ctx.lineTo(W-p.r,y0);ctx.stroke();ctx.setLineDash([]);}
  datasets.forEach(ds=>{
    if(ds.hide)return;
    ctx.strokeStyle=ds.color;ctx.lineWidth=ds.dashed?1.5:2.5;ctx.lineJoin='round';ctx.lineCap='round';
    if(ds.dashed)ctx.setLineDash([6,4]);else ctx.setLineDash([]);
    ctx.beginPath();let st=false;
    ds.data.forEach((v,i)=>{if(v==null||!isFinite(v))return;st?ctx.lineTo(xS(i),yS(v)):ctx.moveTo(xS(i),yS(v));st=true;});
    ctx.stroke();ctx.setLineDash([]);
  });
  el._meta={datasets,xLabels,xS,dpr,W};
}

function drawBars(id,datasets,xLabels,stacked){
  const el=document.getElementById(id);if(!el)return;
  const W=el.offsetWidth||600,H=parseInt(el.dataset.h)||200,dpr=devicePixelRatio||1;
  el.width=W*dpr;el.height=H*dpr;el.style.height=H+'px';
  const ctx=el.getContext('2d');ctx.scale(dpr,dpr);
  const p={l:60,r:14,t:12,b:26},cW=W-p.l-p.r,cH=H-p.t-p.b,n=xLabels.length,gW=cW/n;
  const vis=datasets.filter(d=>!d.hide);
  let mn=0,mx;
  if(stacked){mx=(Math.max(...xLabels.map((_,i)=>vis.reduce((s,d)=>s+(d.data[i]||0),0)))||1)*1.1;}
  else{const av=vis.flatMap(d=>d.data.filter(v=>isFinite(v)));mn=Math.min(0,...av)*1.1;mx=Math.max(0,...av)*1.1||1;}
  const rng=mx-mn||1,yS=v=>p.t+cH-((v-mn)/rng)*cH;
  ctx.fillStyle='#0f172a';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#1e293b';ctx.lineWidth=1;
  for(let i=0;i<=5;i++){const y=p.t+(i/5)*cH;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(W-p.r,y);ctx.stroke();ctx.fillStyle='#4b5563';ctx.font="10px 'DM Sans',sans-serif";ctx.textAlign='right';ctx.fillText(fmtK(mx-(i/5)*rng),p.l-4,y+3.5);}
  const step=Math.max(1,Math.ceil(n/8));ctx.fillStyle='#4b5563';ctx.textAlign='center';
  xLabels.forEach((l,i)=>{if(i%step===0||i===n-1)ctx.fillText(l,p.l+(i+.5)*gW,H-5);});
  if(!stacked&&mn<0){ctx.strokeStyle='#334155';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(p.l,yS(0));ctx.lineTo(W-p.r,yS(0));ctx.stroke();}
  if(stacked){xLabels.forEach((_,i)=>{let base=0;vis.forEach(ds=>{const v=ds.data[i]||0,x=p.l+i*gW+gW*.08,bW=gW*.84,y=yS(base+v),h=Math.max(0,yS(base)-yS(base+v));if(h>.5){ctx.fillStyle=ds.color;ctx.beginPath();ctx.roundRect(x,y,bW,h,[0]);ctx.fill();}base+=v;});});}
  else{const nD=vis.length,bW=Math.min(gW*.72/nD,15);xLabels.forEach((_,i)=>{vis.forEach((ds,di)=>{const v=ds.data[i];if(v==null||!isFinite(v))return;const x=p.l+(i+.05)*gW+di*bW+(gW*.9-nD*bW)/2,y=v>=0?yS(v):yS(0),h=Math.max(1,Math.abs(yS(0)-yS(v)));ctx.fillStyle=ds.color;ctx.beginPath();ctx.roundRect(x,y,bW,h,[v>=0?2:0,v>=0?2:0,v<0?2:0,v<0?2:0]);ctx.fill();});});}
  el._meta={datasets:vis,xLabels,xS:i=>p.l+(i+.5)*gW,dpr,W};
}

const tipEl=document.getElementById('tip');
function attachHover(id,names){
  const el=document.getElementById(id);if(!el||el._hov)return;el._hov=true;el.style.cursor='crosshair';
  el.addEventListener('mousemove',e=>{
    const m=el._meta;if(!m){tipEl.style.display='none';return;}
    const rect=el.getBoundingClientRect(),cx=e.clientX-rect.left;
    let bi=0,bd=1e9;m.xLabels.forEach((_,i)=>{const dx=Math.abs(m.xS(i)*(rect.width/m.W)-cx);if(dx<bd){bd=dx;bi=i;}});
    let h=`<div class="tip-y">Année ${m.xLabels[bi]}</div>`;
    m.datasets.filter(d=>!d.hide).forEach((d,di)=>{const v=d.data[bi];if(v==null||!isFinite(v))return;h+=`<div class="tip-r" style="color:${d.color}"><span style="display:flex;align-items:center;gap:5px"><span class="tip-d" style="background:${d.color}"></span>${d.label||names[di]||''}</span><span style="font-weight:700">${fmtK(v)}</span></div>`;});
    tipEl.innerHTML=h;tipEl.style.display='block';
    let tx=e.clientX+14,ty=e.clientY-10;
    if(tx+tipEl.offsetWidth>innerWidth-8)tx=e.clientX-tipEl.offsetWidth-10;
    if(ty+tipEl.offsetHeight>innerHeight-8)ty=innerHeight-tipEl.offsetHeight-8;
    tipEl.style.left=tx+'px';tipEl.style.top=ty+'px';
  });
  el.addEventListener('mouseleave',()=>tipEl.style.display='none');
}

const popEl=document.getElementById('pop');let popKey=null;
function showPop(key,anchor){
  const info=I[key];if(!info)return;
  popEl.innerHTML=`<h4>${info.t}</h4>${(info.b||'').replace(/\n/g,'<br>')}${info.code?`<code>${info.code}</code>`:''}`;
  popEl.style.display='block';
  const r=anchor.getBoundingClientRect();
  let left=r.right+8,top=r.top-8;
  if(left+280>innerWidth-8)left=r.left-288;
  if(top+popEl.offsetHeight>innerHeight-8)top=innerHeight-popEl.offsetHeight-8;
  popEl.style.left=Math.max(4,left)+'px';popEl.style.top=Math.max(4,top)+'px';
  popKey=key;
}
document.addEventListener('click',e=>{
  const btn=e.target.closest('.ib');
  if(btn){e.stopPropagation();const k=btn.dataset.info;if(k===popKey){popEl.style.display='none';popKey=null;return;}showPop(k,btn);return;}
  if(popKey){popEl.style.display='none';popKey=null;}
  if(_expOpen&&!e.target.closest('#exp-wrap')){_expOpen=false;document.getElementById('exp-menu').style.display='none';document.getElementById('exp-arr').style.transform='';}
});

function renderPanel(key){
  const p=sims[key],res=compute(p),col=COL[key],isLoc=p.mode==='loc';
  const cfNeg=(isLoc?res.cfM:G.loyerPerso-res.mens-res.assM)<0;
  const groups=getGroups(p.mode);

  // KPIs differ by mode
  let kpis;
  if(isLoc){
    kpis=[
      ['Rdt brut',fmtP(res.rendBrut)],
      ['Rdt net',fmtP(res.rendNet)],
      ['Mensualité',fmtE(res.mens+res.assM)],
      ['CF mensuel',fmtE(res.cfM),cfNeg],
    ];
  } else {
    const cross=crossoverYear(res);
    kpis=[
      ['Mensualité',fmtE(res.mens+res.assM)],
      ['Effort/mois',fmtE(res.mens+res.assM-G.loyerPerso),res.mens+res.assM>G.loyerPerso],
      [`Patrim. tot. ${G.horizon}a`,fmtE(res.flux[G.horizon-1]?.patTotal)],
      ['vs ETF pur',cross?`An ${cross}`:(G.investirSurplus?'> 30 ans':'—')],
    ];
  }

  let h=`<div class="sh" style="border-top:3px solid ${col};border-bottom:1px solid ${col}33;background:${col}0d">
    <div class="sh-top">
      <label class="tgl" title="Activer/désactiver cette simulation">
        <input type="checkbox" ${p.enabled?'checked':''} onchange="togSim('${key}',this.checked)">
        <div class="track"></div><div class="knob"></div>
      </label>
      <div class="sh-dot" style="background:${col};box-shadow:0 0 6px ${col}88"></div>
      <input type="text" class="sh-name" value="${p.label}" oninput="updLbl('${key}',this.value)" style="color:${col}">
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <div class="mode-sw">
        <button class="mode-btn ${isLoc?'active':''}" style="${isLoc?'background:'+col:'color:var(--muted)'}" onclick="setMode('${key}','loc')">📊 Locatif</button>
        <button class="mode-btn ${!isLoc?'active':''}" style="${!isLoc?'background:'+col:'color:var(--muted)'}" onclick="setMode('${key}','rp')">🏡 RP</button>
      </div>
    </div>
    <div class="kpis">`;
  kpis.forEach(([lbl,val,neg])=>{h+=`<div class="kc"><div class="kl">${lbl}</div><div class="kv" style="color:${neg?'var(--red)':col}">${val}</div></div>`;});
  h+=`</div></div><div class="sb">`;

  groups.forEach(g=>{
    const open=openGrp[key]===g.t;
    h+=`<button class="gb" onclick="togGrp('${key}','${g.t}')"><span>${g.i} ${g.t}</span><span style="color:var(--muted);transform:${open?'rotate(180deg)':'none'};display:inline-block;transition:.2s;line-height:1">▾</span></button>`;
    if(open){
      h+=`<div class="gc">`;
      g.f.forEach(f=>{
        const v=p[f.k],hasI=!!I[f.k];
        const dv=f.tp==='e'?v:v.toFixed(f.st<.1?2:1);
        const unit=f.tp==='e'?'€':f.tp==='%'?'%':'';
        h+=`<div class="fr"><div class="ft"><div class="fl">${hasI?`<button class="ib" data-info="${f.k}">?</button>`:''}<span>${f.l}</span></div><div class="fw"><input class="ni" type="number" min="${f.mn}" max="${f.mx}" step="${f.st}" value="${dv}" oninput="updN('${key}','${f.k}',this)" style="border-color:${col}44"><span class="gu">${unit}</span></div></div><input type="range" min="${f.mn}" max="${f.mx}" step="${f.st}" value="${v}" oninput="updS('${key}','${f.k}',this)" style="accent-color:${col}"></div>`;
      });
      h+=`</div>`;
    }
  });
  h+=`</div>`;
  document.getElementById('p'+key).innerHTML=h;
  document.getElementById('p'+key).className=`sp${p.enabled?'':' off'}`;
}

function updateKpis(key){/* for slider-only updates without full rebuild */
  renderPanel(key);// simple, small panel — fast enough
}
function updS(k,f,sl){sims[k][f]=parseFloat(sl.value);const ni=document.querySelector(`#p${k} input.ni[oninput*="'${f}'"]`);if(ni){const fd=GROUPS_ALL().find(x=>x.k===f);ni.value=fd&&fd.tp==='e'?sl.value:parseFloat(sl.value).toFixed(fd&&fd.st<.1?2:1);}scheduleRedraw();/* also update KPI chips inline */const res=compute(sims[k]);updateKpiChips(k,res);}
function updN(k,f,inp){const fd=GROUPS_ALL().find(x=>x.k===f);let v=parseFloat(inp.value);if(isNaN(v))return;v=Math.max(fd.mn,Math.min(fd.mx,v));sims[k][f]=v;const sl=document.querySelector(`#p${k} input[type=range][oninput*="'${f}'"]`);if(sl)sl.value=v;scheduleRedraw();const res=compute(sims[k]);updateKpiChips(k,res);}
function GROUPS_ALL(){return[...GRP_COMMON,...GRP_LOC,...GRP_RP].flatMap(g=>g.f);}

function updateKpiChips(key,res){
  const chips=document.querySelectorAll(`#p${key} .kv`);
  const p=sims[key],col=COL[key];
  if(p.mode==='loc'&&chips.length>=4){
    chips[0].textContent=fmtP(res.rendBrut);
    chips[1].textContent=fmtP(res.rendNet);
    chips[2].textContent=fmtE(res.mens+res.assM);
    chips[3].textContent=fmtE(res.cfM);chips[3].style.color=res.cfM<0?'var(--red)':col;
  } else if(p.mode==='rp'&&chips.length>=4){
    const cross=crossoverYear(res);
    chips[0].textContent=fmtE(res.mens+res.assM);
    const effort=res.mens+res.assM-G.loyerPerso;
    chips[1].textContent=fmtE(effort);chips[1].style.color=effort>0?'var(--red)':col;
    chips[2].textContent=fmtE(res.flux[G.horizon-1]?.patTotal);
    chips[3].textContent=cross?`An ${cross}`:(G.investirSurplus?'> 30 ans':'—');
  }
}

function togGrp(k,t){openGrp[k]=openGrp[k]===t?null:t;renderPanel(k);}

];

  document.getElementById('tabs').innerHTML=TAB_DEFS.map(([id,lbl])=>`<button class="tab${curTab===id?' active':''}" onclick="setTab('${id}')">${lbl}</button>`).join('');
}

function renderLegend(){
  let h='';
  KEYS.forEach(k=>{
    const p=sims[k],col=COL[k],on=p.enabled;
    const modeTag=p.mode==='loc'?'📊':'🏡';
    h+=`<div class="li${on?'':' off'}" onclick="togSim('${k}',${!on})" title="Cliquer pour ${on?'masquer':'afficher'}">
      <div class="ll" style="background:${on?col:'#475569'}"></div>
      <span style="color:${on?col:'#475569'}">${modeTag} ${p.label}</span>
    </div>`;

    if(G.investirSurplus&&on){
      h+=`<div class="li" style="cursor:default"><div class="ll" style="background:${col};opacity:.4;border:1px dashed ${col}"></div><span style="color:${col};opacity:.5;font-size:10px">ETF pur — ${p.label}</span></div>`;
    }
  });
  h+=`<span style="font-size:9px;color:var(--muted);margin-left:auto">Cliquer pour masquer/afficher</span>`;
  document.getElementById('legend').innerHTML=h;
}

let _raf=null;
function scheduleRedraw(){if(_raf)cancelAnimationFrame(_raf);_raf=requestAnimationFrame(redraw);}

function redraw(){
  _raf=null;
  const RES={};KEYS.forEach(k=>RES[k]=compute(sims[k]));
  const yrs=Array.from({length:30},(_,i)=>i+1);
  const names=KEYS.map(k=>sims[k].label);
  const enabled=k=>sims[k].enabled;
  const hide=k=>!sims[k].enabled;

  if(curTab==='charts'){
    // Chart 1: CF immobilier cumulé (immo-only, no ETF)
    const ds1=KEYS.map(k=>({color:COL[k],data:yrs.map(i=>RES[k].flux[i-1]?.cfC),hide:hide(k),label:sims[k].label}));
    drawLine('c1',ds1,yrs);attachHover('c1',ds1.map(d=>d.label));

    // Chart 2: Patrimoine total (immo equity + ETF poche) + ETF pur (dashed)
    let ds2=[];
    KEYS.forEach(k=>{
      ds2.push({color:COL[k],data:yrs.map(i=>RES[k].flux[i-1]?.patTotal),hide:hide(k),label:sims[k].label});
      if(G.investirSurplus&&sims[k].enabled){
        ds2.push({color:COL[k],data:yrs.map(i=>RES[k].etfPur[i-1]?.cap),hide:false,dashed:true,label:`ETF pur — ${sims[k].label}`});
      }
    });
    drawLine('c2',ds2,yrs);attachHover('c2',ds2.map(d=>d.label));

    // Chart 3: CF net annuel (bars)
    const ds3=KEYS.map(k=>({color:COL[k],data:yrs.map(i=>RES[k].flux[i-1]?.cfN),hide:hide(k),label:sims[k].label}));
    drawBars('c3',ds3,yrs,false);attachHover('c3',names);

    // Chart 4: Valeur du bien
    const ds4=KEYS.map(k=>({color:COL[k],data:yrs.map(i=>RES[k].flux[i-1]?.vb),hide:hide(k),label:sims[k].label}));
    drawLine('c4',ds4,yrs);attachHover('c4',names);
  }

  else if(curTab==='kpis'){
    const regime={'lmnp':'LMNP Réel','microbic':'Micro-BIC','nu':'Foncier nu'}[G.regime];
    const rows=[
      ["Type",k=>sims[k].mode==='loc'?'📊 Locatif':'🏡 RP'],
      ["Coût total acq.",k=>fmtE(RES[k].ct)],
      ["Montant emprunté",k=>fmtE(RES[k].emp)],
      ["Mensualité + assurance",k=>fmtE(RES[k].mens+RES[k].assM)],
      ["Coût total crédit",k=>fmtE(RES[k].totInt+RES[k].totAss)],
      ...(KEYS.some(k=>sims[k].mode==='loc')?[
        ["Rendement brut (loc.)",k=>sims[k].mode==='loc'?fmtP(RES[k].rendBrut):'—'],
        ["Rendement net (loc.)",k=>sims[k].mode==='loc'?fmtP(RES[k].rendNet):'—'],
        ["CF mensuel net (loc.)",k=>sims[k].mode==='loc'?fmtE(RES[k].cfM):'—'],
      ]:[]),
      ...(KEYS.some(k=>sims[k].mode==='rp')?[
        ["Effort mensuel (RP)",k=>sims[k].mode==='rp'?fmtE(RES[k].mens+RES[k].assM-G.loyerPerso):'—'],
      ]:[]),
      ["Breakeven CF immo cumulé",k=>RES[k].be?`An ${RES[k].be}`:'> 30 ans'],
      ["TRI 10 ans",k=>fmtTRI(RES[k].tri10)],
      ["TRI 15 ans",k=>fmtTRI(RES[k].tri15)],
      ["TRI 20 ans",k=>fmtTRI(RES[k].tri20)],
      [`VAN (${G.tauxActu}%, ${G.horizon}a)`,k=>fmtE(RES[k].van)],
      [`MOIC ${G.horizon} ans`,k=>RES[k].moic?RES[k].moic.toFixed(2)+'×':'—'],
      [`Patrimoine immo net ${G.horizon}a`,k=>fmtE(RES[k].flux[G.horizon-1]?.patNet)],
      [`Patrimoine total ${G.horizon}a ⬛`,k=>fmtE(RES[k].flux[G.horizon-1]?.patTotal)],
      [`Patrimoine total 30a ⬛`,k=>fmtE(RES[k].flux[29]?.patTotal)],
      ...(G.investirSurplus?[
        [`ETF pur ${G.horizon}a ⬜`,k=>fmtE(RES[k].etfPur[G.horizon-1]?.cap)],
        [`ETF pur 30a ⬜`,k=>fmtE(RES[k].etfPur[29]?.cap)],
        [`Avantage vs ETF pur ${G.horizon}a`,k=>{
          const tot=RES[k].flux[G.horizon-1]?.patTotal,etf=RES[k].etfPur[G.horizon-1]?.cap;
          return(tot!=null&&etf!=null)?fmtE(tot-etf):'—';
        }],
        [`Croisement vs ETF pur`,k=>{const c=crossoverYear(RES[k]);return c?`Année ${c}`:'> 30 ans';}],
      ]:[]),
    ];

    let tbody='';rows.forEach(([lbl,vFn])=>{tbody+=`<tr><td class="td-lbl">${lbl}</td>`;KEYS.forEach(k=>{const on=sims[k].enabled;tbody+=`<td class="tr" style="color:${on?COL[k]:'#475569'}">${on?vFn(k):'—'}</td>`;});tbody+=`</tr>`;});
    document.getElementById('kpi-card').innerHTML=`
      <div class="ct">🎯 Tableau comparatif — Régime locatif : <span style="color:#fbbf24">${regime}</span></div>
      <div class="cs">⬛ Patrimoine total = équité immo + ETF du surplus mensuel (budget − sorties réelles). ⬜ ETF pur = même apport + même budget investi sans achat. Base de comparaison équitable.</div>
      <table><thead><tr><th>Indicateur</th>${KEYS.map(k=>`<th style="text-align:right;color:${COL[k]}">${sims[k].label}</th>`).join('')}</tr></thead><tbody>${tbody}</tbody></table>`;
  }

  else if(curTab==='revente'){
    let ds=[];
    KEYS.forEach(k=>{
      ds.push({color:COL[k],data:yrs.map(i=>RES[k].flux[i-1]?.bilanRevente),hide:hide(k),label:sims[k].label});
      if(G.investirSurplus&&sims[k].enabled){
        ds.push({color:COL[k],data:yrs.map(i=>RES[k].etfPur[i-1]?.cap-sims[k].apport),hide:false,dashed:true,label:`ETF pur — ${sims[k].label}`});
      }
    });
    drawLine('cr',ds,yrs);attachHover('cr',ds.map(d=>d.label));

    let rows='';
    [5,10,15,20,25,30].forEach(yr=>{
      rows+=`<div class="rg"><div class="yb">Yr ${yr}</div>`;
      KEYS.forEach(k=>{
        if(!sims[k].enabled){rows+=`<div class="rc" style="background:#1118;padding:6px 8px;font-size:10px;color:#475569">Désactivé</div>`;return;}
        const f=RES[k].flux[yr-1],col=COL[k],pos=(f?.bilanRevente||0)>=0;
        rows+=`<div class="rc" style="background:${col}0f;border:1px solid ${col}28">
          <div style="font-size:9px;font-weight:700;color:${col};margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px">${sims[k].mode==='loc'?'📊':'🏡'} ${sims[k].label}</div>
          <div style="font-size:10px">Revente : <b>${fmtK(f?.pr)}</b></div>
          <div style="font-size:10px">Capital restant : <b style="color:var(--red)">${fmtK(f?.rest)}</b></div>
          <div style="font-size:10px;color:${pos?'var(--green)':'var(--red)'}">Bilan : <b>${fmtK(f?.bilanRevente)}</b></div>
        </div>`;
      });
      rows+=`</div>`;
    });
    document.getElementById('rev-t').innerHTML=rows;
  }

  else if(curTab==='amort'){
    const YRS=[1,3,5,7,10,12,15,18,20];
    KEYS.filter(k=>sims[k].enabled).forEach(k=>{
      const res=RES[k];
      const capA=YRS.map(yr=>{const s=(yr-1)*12,e=Math.min(yr*12,res.amort.length);return res.amort.slice(s,e).reduce((a,m)=>a+m.cap,0);});
      const intA=YRS.map(yr=>{const s=(yr-1)*12,e=Math.min(yr*12,res.amort.length);return res.amort.slice(s,e).reduce((a,m)=>a+m.inter,0);});
      const assA=YRS.map(yr=>{const s=(yr-1)*12,e=Math.min(yr*12,res.amort.length);return res.amort.slice(s,e).reduce((a,m)=>a+m.assur,0);});
      drawBars(`am${k}`,[{color:'#4ade80',data:capA},{color:'#f87171',data:intA},{color:'#fbbf24',data:assA}],YRS.map(y=>`An ${y}`),true);
    });
    const dsCap=KEYS.map(k=>({color:COL[k],data:yrs.map(i=>RES[k].flux[i-1]?.rest),hide:hide(k),label:sims[k].label}));
    drawLine('amcap',dsCap,yrs);attachHover('amcap',names);
  }
}

function buildExportData(){
  const d={global:{...G},simulations:{}};
  KEYS.forEach(k=>{
    const p=sims[k],r=compute(p);
    d.simulations[k]={
      label:p.label,enabled:p.enabled,
      inputs:{...p},
      computed:{
        coutTotal:r.ct,montantEmprunte:r.emp,
        mensualite:Math.round(r.mens),assuranceMensuelle:Math.round(r.assM),
        totalInterets:Math.round(r.totInt),totalAssurance:Math.round(r.totAss),
        rendementBrut:p.mode==='loc'?+r.rendBrut.toFixed(4):null,
        rendementNet:p.mode==='loc'?+r.rendNet.toFixed(4):null,
        cashflowMensuel:Math.round(r.cfM),
        breakevenAns:r.be,
        tri10ans:r.tri10!=null?+(r.tri10*100).toFixed(4):null,
        tri15ans:r.tri15!=null?+(r.tri15*100).toFixed(4):null,
        tri20ans:r.tri20!=null?+(r.tri20*100).toFixed(4):null,
        van:Math.round(r.van),moic:r.moic?+r.moic.toFixed(4):null,
        flux:r.flux.map(f=>({
          annee:f.yr,
          ...(p.mode==='loc'?{loyersEncaisses:Math.round(f.le)}:{loyerEconomise:Math.round(f.le)}),
          charges:Math.round(f.chg),annuitePlusAssurance:Math.round(f.ann),
          ...(p.mode==='loc'?{impots:Math.round(f.imp)}:{}),
          cfNet:Math.round(f.cfN),cfCumule:Math.round(f.cfC),
          valeurBien:Math.round(f.vb),capitalRestant:Math.round(f.rest),
          patrimoineNet:Math.round(f.patNet),
          patrimoineTotal:Math.round(f.patTotal),etfPoche:Math.round(f.etfPoche),
          reventeNette:Math.round(f.reventeNet),
          bilanRevente:Math.round(f.bilanRevente),
        })),
        etfPur:r.etfPur.map(e=>({annee:e.yr,capitalEtf:Math.round(e.cap),surplusAnnuel:Math.round(e.surplus)})),
      }
    };
  });
  return d;
}

function dlFile(name,content,type){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type}));
  a.download=name;a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}

    ['Taxe foncière (€/an)',k=>d.simulations[k].inputs.mode==='loc'?d.simulations[k].inputs.taxeFonciere:d.simulations[k].inputs.taxeFonciereRP],

    ['Gestion locative (%)',k=>d.simulations[k].inputs.mode==='loc'?d.simulations[k].inputs.fraisGestion:''],
    ['Provision travaux (€/an)',k=>d.simulations[k].inputs.mode==='loc'?d.simulations[k].inputs.provision:d.simulations[k].inputs.provisionRP],
    ['Reval. loyer (%/an)',k=>d.simulations[k].inputs.mode==='loc'?d.simulations[k].inputs.revalLoyer:''],
    ['TMI (%)',k=>d.simulations[k].inputs.mode==='loc'?d.simulations[k].inputs.tmi:''],
    ['Prélèvements sociaux (%)',k=>d.simulations[k].inputs.mode==='loc'?d.simulations[k].inputs.ps:''],
    ['Amort. bien (%/an)',k=>d.simulations[k].inputs.mode==='loc'?d.simulations[k].inputs.amortBien:''],
    ['Amort. travaux (%/an)',k=>d.simulations[k].inputs.mode==='loc'?d.simulations[k].inputs.amortTravaux:''],
    ['Impôt PV (%)',k=>d.simulations[k].inputs.mode==='loc'?d.simulations[k].inputs.impotPV:''],
    ['PS PV (%)',k=>d.simulations[k].inputs.mode==='loc'?d.simulations[k].inputs.psPV:''],
  ].forEach(([l,fn])=>row(l,...KEYS.map(fn)));
  row('');

  row('## Résultats calculés');row('Indicateur',...lbls);
  [
    ["Coût total acq. (€)",k=>d.simulations[k].computed.coutTotal],
    ['Montant emprunté (€)',k=>d.simulations[k].computed.montantEmprunte],
    ['Mensualité+ass (€)',k=>d.simulations[k].computed.mensualite+d.simulations[k].computed.assuranceMensuelle],
    ['Total intérêts (€)',k=>d.simulations[k].computed.totalInterets],
    ['Total assurance (€)',k=>d.simulations[k].computed.totalAssurance],
    ['Rendement brut (%)',k=>d.simulations[k].computed.rendementBrut??''],
    ['Rendement net (%)',k=>d.simulations[k].computed.rendementNet??''],
    ['CF mensuel (€)',k=>d.simulations[k].computed.cashflowMensuel??''],
    ['Breakeven (ans)',k=>d.simulations[k].computed.breakevenAns??'>30'],
    ['TRI 10a (%)',k=>d.simulations[k].computed.tri10ans??'N/C'],
    ['TRI 15a (%)',k=>d.simulations[k].computed.tri15ans??'N/C'],
    ['TRI 20a (%)',k=>d.simulations[k].computed.tri20ans??'N/C'],
    ['VAN (€)',k=>d.simulations[k].computed.van],
    ['MOIC',k=>d.simulations[k].computed.moic??''],
  ].forEach(([l,fn])=>row(l,...KEYS.map(fn)));
  row('');

  KEYS.forEach(k=>{
    const s=d.simulations[k],isLoc=s.inputs.mode==='loc';
    row(`## Flux annuels — ${s.label}`);
    row('Année',isLoc?'Loyers encaissés (€)':'Loyer économisé (€)',
      'Charges (€)','Annuité+Ass (€)',...(isLoc?['Impôts (€)']:[]),
      'CF net (€)','CF cumulé (€)','Valeur bien (€)',
      'Capital restant (€)','Patrimoine immo net (€)','Patrimoine total (€)','ETF poche (€)','Revente nette (€)','Bilan revente (€)',
      'ETF pur (€)');
    s.computed.flux.forEach((f,i)=>{
      row(f.annee,isLoc?f.loyersEncaisses:f.loyerEconomise,
        f.charges,f.annuitePlusAssurance,...(isLoc?[f.impots]:[]),
        f.cfNet,f.cfCumule,f.valeurBien,f.capitalRestant,
        f.patrimoineNet,f.patrimoineTotal??'',f.etfPoche??'',f.reventeNette,f.bilanRevente,
        s.computed.etfPur?.[i]?.capitalEtf??'');
    });
    row('');
  });
  return lines.join('\n');
}

function toYAML(val,depth=0){
  const pad='  '.repeat(depth);
  if(val===null||val===undefined)return'null';
  if(typeof val==='boolean')return String(val);
  if(typeof val==='number')return isFinite(val)?String(val):'null';
  if(typeof val==='string'){
    const nq=val===''||['true','false','null','yes','no'].includes(val.toLowerCase())||
      /^[\d\-]/.test(val)||/[\n:#\[\]{},&*?|<>=!%@`"']/.test(val);
    return nq?JSON.stringify(val):val;
  }
  if(Array.isArray(val)){
    if(!val.length)return'[]';
    return val.map(item=>{
      if(item!==null&&typeof item==='object'){
        const inner=toYAML(item,depth+1);
        const ipad='  '.repeat(depth+1);
        const nl=inner.indexOf('\n');
        const first=nl>=0?inner.slice(0,nl):inner;
        const rest=nl>=0?inner.slice(nl):'';
        return`${pad}- ${first.slice(ipad.length)}${rest}`;
      }
      return`${pad}- ${toYAML(item,0)}`;
    }).join('\n');
  }
  const entries=Object.entries(val);
  if(!entries.length)return'{}';
  return entries.map(([k,v])=>{
    if(v!==null&&typeof v==='object'){
      if(Array.isArray(v)&&!v.length)return`${pad}${k}: []`;
      if(!Array.isArray(v)&&!Object.keys(v).length)return`${pad}${k}: {}`;
      return`${pad}${k}:\n${toYAML(v,depth+1)}`;
    }
    return`${pad}${k}: ${toYAML(v,0)}`;
  }).join('\n');
}

// ── Import ────────────────────────────────────────────────
function parseCSVRow(line){
  const cells=[];let cell='',inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){if(inQ&&line[i+1]==='"'){cell+='"';i++;}else inQ=!inQ;}
    else if(c===','&&!inQ){cells.push(cell);cell='';}
    else cell+=c;
  }
  cells.push(cell);return cells;
}

function parseCSVSections(text){
  const sections={};let sec=null;
  for(const raw of text.split('\n')){
    const t=raw.trim();if(!t)continue;
    if(t.startsWith('##')){sec=t.replace(/^##\s*/,'').trim();sections[sec]={headers:[],rows:[]};continue;}
    if(!sec)continue;
    const cells=parseCSVRow(raw).map(c=>c.trim());
    if(!cells.some(c=>c))continue;
    if(!sections[sec].headers.length)sections[sec].headers=cells;
    else sections[sec].rows.push(cells);
  }
  return sections;
}

function yScalar(s){
  s=s.trim();
  if(!s||s==='null'||s==='~')return null;
  if(s==='true')return true;if(s==='false')return false;
  const n=Number(s);if(!isNaN(n)&&s!=='')return n;
  if((s[0]==='"'||s[0]==="'")&&s[s.length-1]===s[0]){try{return JSON.parse(s);}catch(e){return s.slice(1,-1);}}
  return s;
}

function parseYAMLFlat(text){
  const flat={},stack=[];let skipTo=-1;
  for(const line of text.split('\n')){
    if(/^\s*(#.*)?$/.test(line))continue;
    const li=line.search(/\S/),tr=line.trim();
    while(stack.length&&stack[stack.length-1].i>=li)stack.pop();
    if(skipTo>=0&&li>skipTo)continue;
    skipTo=-1;
    if(tr.startsWith('- ')){skipTo=li;continue;}
    const ci=tr.indexOf(':');if(ci<0)continue;
    const k=tr.slice(0,ci).trim(),vs=tr.slice(ci+1).trim();
    if(vs&&!vs.startsWith('#'))flat[[...stack.map(s=>s.k),k].join('.')]=yScalar(vs);
    stack.push({k,i:li});
  }
  return flat;
}

function restoreFromJSON(data){
  if(!data||typeof data!=='object')throw new Error('Structure invalide');
  const g=data.global||{};
  if(g.inflation!=null)G.inflation=+g.inflation;
  if(g.regime)G.regime=String(g.regime);
  if(g.horizon!=null)G.horizon=+g.horizon;
  if(g.tauxActu!=null)G.tauxActu=+g.tauxActu;
  if(g.rendAlt!=null)G.rendAlt=+g.rendAlt;
  if(g.loyerPerso!=null)G.loyerPerso=+g.loyerPerso;
  if(g.revalLoyerPerso!=null)G.revalLoyerPerso=+g.revalLoyerPerso;
  if(g.budgetMensuel!=null)G.budgetMensuel=+g.budgetMensuel;
  if(g.investirSurplus!=null)G.investirSurplus=g.investirSurplus===true||g.investirSurplus==='true';
  const sData=data.simulations||{};
  KEYS.forEach(k=>{
    const s=sData[k];if(!s)return;
    if(s.label!=null)sims[k].label=String(s.label);
    if(s.enabled!=null)sims[k].enabled=s.enabled===true||s.enabled==='true';
    const inp=s.inputs||{};
    Object.keys(mkDef('loc')).forEach(f=>{
      if(inp[f]==null)return;
      if(f==='mode'||f==='label')sims[k][f]=String(inp[f]);
      else if(f==='enabled')sims[k][f]=inp[f]===true||inp[f]==='true';
      else{const n=parseFloat(inp[f]);if(!isNaN(n))sims[k][f]=n;}
    });
  });
}

function restoreFromYAML(flat){
  if(flat['global.inflation']!=null)G.inflation=+flat['global.inflation'];
  if(flat['global.regime'])G.regime=String(flat['global.regime']);
  if(flat['global.horizon']!=null)G.horizon=+flat['global.horizon'];
  if(flat['global.tauxActu']!=null)G.tauxActu=+flat['global.tauxActu'];
  if(flat['global.rendAlt']!=null)G.rendAlt=+flat['global.rendAlt'];
  if(flat['global.loyerPerso']!=null)G.loyerPerso=+flat['global.loyerPerso'];
  if(flat['global.revalLoyerPerso']!=null)G.revalLoyerPerso=+flat['global.revalLoyerPerso'];
  if(flat['global.budgetMensuel']!=null)G.budgetMensuel=+flat['global.budgetMensuel'];
  if(flat['global.investirSurplus']!=null)G.investirSurplus=flat['global.investirSurplus']===true||flat['global.investirSurplus']==='true';
  KEYS.forEach(k=>{
    const lbl=flat[`simulations.${k}.label`],en=flat[`simulations.${k}.enabled`];
    if(lbl!=null)sims[k].label=String(lbl);
    if(en!=null)sims[k].enabled=en===true||en==='true';
    Object.keys(mkDef('loc')).forEach(f=>{
      const v=flat[`simulations.${k}.inputs.${f}`];if(v==null)return;
      if(f==='mode'||f==='label')sims[k][f]=String(v);
      else if(f==='enabled')sims[k][f]=v===true||v==='true';
      else{const n=parseFloat(v);if(!isNaN(n))sims[k][f]=n;}
    });
  });
}

function restoreFromCSV(sections){
  const gSec=sections['Paramètres globaux'];
  if(gSec){for(const r of gSec.rows){
    const[p,v]=r,n=parseFloat(v);
    if(p==='Inflation')G.inflation=n;
    else if(p==='Régime fiscal')G.regime=v;
    else if(p==='Horizon')G.horizon=n;
    else if(p==="Taux d'actualisation (VAN)")G.tauxActu=n;
    else if(p==='Rdt placement alternatif (net)')G.rendAlt=n;
    else if(p==='Loyer perso (€/mois)')G.loyerPerso=n;
    else if(p==='Reval. loyer perso (%/an)')G.revalLoyerPerso=n;
    else if(p==='Budget mensuel (€/mois)')G.budgetMensuel=n;
    else if(p==='Investir surplus ETF')G.investirSurplus=v==='true';
  }}
  const sSec=sections['Paramètres des simulations'];if(!sSec)return;
  KEYS.forEach((k,i)=>{const lbl=sSec.headers[i+1];if(lbl)sims[k].label=lbl;});
  const fm={
    'Mode':(p,v)=>{p.mode=v==='Locatif'?'loc':v==='RP'?'rp':v;},
    "Prix d'achat (€)":(p,v)=>{p.prixAchat=+v;},
    'Frais notaire (€)':(p,v)=>{p.fraisNotaire=+v;},
    'Travaux (€)':(p,v)=>{p.travaux=+v;},
    "Frais agence achat (€)":(p,v)=>{p.fraisAgence=+v;},
    'Apport (€)':(p,v)=>{p.apport=+v;},
    "Taux intérêt (%)":(p,v)=>{p.taux=+v;},
    'Durée (ans)':(p,v)=>{p.duree=+v;},
    'Assurance emprunteur (%)':(p,v)=>{p.assurance=+v;},
    'Reval. bien (%/an)':(p,v)=>{p.revalBien=+v;},
    'Frais agence vente (%)':(p,v)=>{p.fraisVente=+v;},
    'Loyer mensuel brut (€)':(p,v)=>{if(v)p.loyer=+v;},
    'Taux vacance (%)':(p,v)=>{if(v)p.vacance=+v;},
    'Taxe foncière (€/an)':(p,v)=>{if(!v)return;p.mode==='loc'?(p.taxeFonciere=+v):(p.taxeFonciereRP=+v);},
    'Charges copro (€/an)':(p,v)=>{if(!v)return;p.mode==='loc'?(p.chargesCopro=+v):(p.chargesCoproRP=+v);},
    'Assurance PNO/Hab (€/an)':(p,v)=>{if(!v)return;p.mode==='loc'?(p.assurPNO=+v):(p.assurHab=+v);},
    'Gestion locative (%)':(p,v)=>{if(v)p.fraisGestion=+v;},
    'Provision travaux (€/an)':(p,v)=>{if(!v)return;p.mode==='loc'?(p.provision=+v):(p.provisionRP=+v);},
    'Reval. loyer (%/an)':(p,v)=>{if(!v||p.mode!=='loc')return;p.revalLoyer=+v;},
    'TMI (%)':(p,v)=>{if(v)p.tmi=+v;},
    'Prélèvements sociaux (%)':(p,v)=>{if(v)p.ps=+v;},
    'Amort. bien (%/an)':(p,v)=>{if(v)p.amortBien=+v;},
    'Amort. travaux (%/an)':(p,v)=>{if(v)p.amortTravaux=+v;},
    'Impôt PV (%)':(p,v)=>{if(v)p.impotPV=+v;},
    'PS PV (%)':(p,v)=>{if(v)p.psPV=+v;},
  };
  for(const row of sSec.rows){
    const fn=fm[row[0]];if(!fn)continue;
    KEYS.forEach((k,i)=>{const v=row[i+1];if(v!=null&&v!=='')fn(sims[k],v);});
  }
}

function handleImport(input){
  const file=input.files[0];if(!file)return;
  const ext=file.name.split('.').pop().toLowerCase();
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const text=e.target.result;
      if(ext==='json')restoreFromJSON(JSON.parse(text));
      else if(ext==='yaml'||ext==='yml')restoreFromYAML(parseYAMLFlat(text));
      else if(ext==='csv')restoreFromCSV(parseCSVSections(text));
      else throw new Error('Format non supporté : '+ext);
      KEYS.forEach(k=>{openGrp[k]=sims[k].mode==='loc'?'Exploitation':'Résidence principale';renderPanel(k);});
      buildGS();renderLegend();rebuildShell();scheduleRedraw();
    }catch(err){alert('Erreur importation :\n'+err.message);}
    finally{input.value='';}
  };
  reader.readAsText(file,'UTF-8');
}

let _expOpen=false;
function toggleExpMenu(){
  _expOpen=!_expOpen;
  document.getElementById('exp-menu').style.display=_expOpen?'block':'none';
  document.getElementById('exp-arr').style.transform=_expOpen?'rotate(180deg)':'';
}
function doExport(fmt){
  toggleExpMenu();
  const d=buildExportData();
  const ts=new Date().toISOString().slice(0,10);
  if(fmt==='json')dlFile(`immorenta_${ts}.json`,JSON.stringify(d,null,2),'application/json');
  else if(fmt==='csv')dlFile(`immorenta_${ts}.csv`,exportToCSV(d),'text/csv');
  else if(fmt==='yaml')dlFile(`immorenta_${ts}.yaml`,toYAML(d),'text/yaml');
}
