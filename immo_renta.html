<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImmoRenta — Analyse Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020817;--surface:#0f172a;--s2:#0d1b2a;--border:#1e293b;
  --text:#e2e8f0;--muted:#64748b;--subtle:#334155;
  --a:#6C9AFF;--b:#FF9D5C;--c:#5CEFB0;
  --red:#f87171;--green:#4ade80;--yellow:#fbbf24;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;overflow-x:hidden;min-height:100vh}

/* Number input spinners — styled to match theme */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{opacity:1;height:16px;cursor:pointer}
input[type=number]{-moz-appearance:textfield}

.nav{position:sticky;top:0;z-index:200;background:#070f1e;border-bottom:1px solid var(--border);height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 16px}
.nav-brand{display:flex;align-items:center;gap:8px;font-weight:800;font-size:14px;white-space:nowrap}
.badge{font-size:9px;color:var(--muted);background:var(--border);padding:2px 7px;border-radius:20px;font-weight:600}
.tabs{display:flex;gap:3px;flex-wrap:wrap}
.tab{padding:5px 10px;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;transition:all .15s;white-space:nowrap}
.tab.active{background:#1e40af;color:#93c5fd}
.tab:not(.active){background:transparent;color:var(--muted)}
.tab:not(.active):hover{background:var(--border);color:var(--text)}

/* Global strip */
.gs{background:var(--surface);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:11px}
.gs-t{font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-right:4px;white-space:nowrap;font-size:10px}
.gf{display:flex;align-items:center;gap:5px;background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:3px 8px}
.gl{color:var(--muted);white-space:nowrap;font-size:10px}
.gi{width:50px;background:transparent;border:none;outline:none;font-family:inherit;font-size:11px;font-weight:700;color:#fbbf24;text-align:right;padding:0}
.gu{font-size:9px;color:var(--muted);white-space:nowrap}
.gd{width:1px;height:16px;background:var(--border);margin:0 2px}

/* Layout */
.layout{display:grid;grid-template-columns:repeat(3,272px) 1fr;gap:10px;padding:10px 12px;max-width:1900px;margin:0 auto}

/* Sim Panel */
.sp{background:var(--surface);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;height:calc(100vh - 106px);position:sticky;top:98px;transition:opacity .25s}
.sp.off{opacity:.35}
.sp.off .sb{pointer-events:none}
.sp.off .sh{filter:grayscale(.7)}
.sh{padding:10px 12px;flex-shrink:0}
.sh-top{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.sh-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sh-name{background:transparent;border:none;outline:none;font-family:inherit;font-size:13px;font-weight:700;cursor:text;width:100%;padding:0}
/* toggle switch */
.tgl{position:relative;width:32px;height:18px;flex-shrink:0;cursor:pointer}
.tgl input{display:none}
.tgl .track{position:absolute;inset:0;border-radius:9px;background:var(--subtle);transition:background .2s}
.tgl input:checked+.track{background:#1e40af}
.tgl .knob{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#e2e8f0;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.4)}
.tgl input:checked~.knob{transform:translateX(14px)}
/* mode switcher (RP/LOC) */
.mode-sw{display:flex;border-radius:6px;overflow:hidden;border:1px solid var(--border);font-size:10px;font-weight:700}
.mode-btn{padding:3px 10px;cursor:pointer;border:none;font-family:inherit;font-size:10px;font-weight:700;transition:all .15s;background:transparent;color:var(--muted)}
.mode-btn.active{color:#fff}
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:6px}
.kc{background:var(--bg);border-radius:6px;padding:3px 7px}
.kl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.kv{font-size:11px;font-weight:700;margin-top:1px;transition:color .2s}
.sb{overflow-y:auto;flex:1;overscroll-behavior:contain}
.sb::-webkit-scrollbar{width:3px}
.sb::-webkit-scrollbar-thumb{background:var(--subtle);border-radius:2px}

.gb{width:100%;background:none;border:none;display:flex;justify-content:space-between;align-items:center;padding:6px 12px;color:var(--text);cursor:pointer;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;font-family:inherit;transition:background .1s}
.gb:hover{background:var(--border)}
.gc{padding:2px 11px 6px}
.fr{margin-bottom:7px}
.ft{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;gap:4px}
.fl{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:3px;flex:1;min-width:0}
.fl span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ib{width:13px;height:13px;border-radius:50%;background:var(--border);border:none;color:var(--muted);font-size:8px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'DM Sans',sans-serif;font-weight:800;line-height:1;transition:background .15s,color .15s;vertical-align:middle}
.ib:hover{background:#334155;color:var(--text)}
.fw{display:flex;align-items:center;gap:3px;flex-shrink:0}
.ni{width:60px;background:var(--s2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:inherit;font-size:10px;font-weight:700;padding:2px 5px;text-align:right;outline:none;transition:border-color .15s}
.ni:focus{border-color:#475569}
input[type=range]{width:100%;cursor:pointer;height:4px;border-radius:2px;-webkit-appearance:none;appearance:none;background:var(--border);display:block;margin:0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;cursor:grab;border:2px solid var(--bg);box-shadow:0 0 4px rgba(0,0,0,.6)}
input[type=range]:active::-webkit-slider-thumb{cursor:grabbing;transform:scale(1.15)}
input[type=range]::-moz-range-thumb{width:12px;height:12px;border-radius:50%;cursor:grab;border:2px solid var(--bg)}
input[type=range]:focus{outline:none}

/* Content */
.content{display:flex;flex-direction:column;gap:10px;min-width:0}
.lb{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 14px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;cursor:pointer;user-select:none;transition:opacity .2s}
.li.off{opacity:.3;text-decoration:line-through}
.ll{width:20px;height:3px;border-radius:2px;transition:background .2s}
.cc{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 12px}
.ct{font-size:13px;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:7px}
.cs{font-size:10px;color:var(--muted);margin-bottom:10px;line-height:1.5;border-left:2px solid var(--border);padding-left:8px}
canvas{display:block;width:100%}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:6px 10px;color:var(--muted);border-bottom:1px solid var(--border);font-weight:600;font-size:10px}
td{padding:7px 10px;font-size:11px}
tr:nth-child(even) td{background:var(--s2)}
.tr{text-align:right;font-weight:700}

.tip{position:fixed;background:#070f1e;border:1px solid #334155;border-radius:9px;padding:8px 12px;font-size:11px;pointer-events:none;display:none;z-index:999;min-width:170px;box-shadow:0 4px 24px rgba(0,0,0,.7)}
.tip-y{color:#94a3b8;font-weight:700;margin-bottom:4px;border-bottom:1px solid var(--border);padding-bottom:3px;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.tip-r{display:flex;justify-content:space-between;gap:12px;margin-top:2px;align-items:center}
.tip-d{width:7px;height:7px;border-radius:50%;flex-shrink:0}

.pop{position:fixed;background:#0a1628;border:1px solid #334155;border-radius:10px;padding:12px 14px;font-size:11px;line-height:1.6;color:#94a3b8;max-width:280px;z-index:600;box-shadow:0 8px 32px rgba(0,0,0,.8);display:none;pointer-events:none}
.pop h4{color:var(--text);font-size:12px;margin-bottom:5px;font-weight:700}
.pop code{display:block;background:var(--border);border-radius:4px;padding:3px 8px;font-family:monospace;font-size:10px;color:#fbbf24;margin-top:6px}

.rg{display:grid;grid-template-columns:50px repeat(3,1fr);gap:4px;margin-bottom:6px;align-items:start}
.rc{border-radius:7px;padding:6px 8px}
.yb{font-size:10px;color:var(--muted);font-weight:700;padding-top:5px}
.am-lg{display:flex;gap:10px;font-size:10px;color:var(--muted);margin-bottom:4px}
.am-d{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:3px;vertical-align:middle}
</style>
</head>
<body>
<div class="nav">
  <div class="nav-brand"><span>🏠</span><span>ImmoRenta</span><span class="badge">ANALYSE PRO v3</span></div>
  <div class="tabs" id="tabs"></div>
</div>
<div class="gs" id="gs"></div>
<div class="layout">
  <div id="pA" class="sp"></div>
  <div id="pB" class="sp"></div>
  <div id="pC" class="sp"></div>
  <div class="content">
    <div class="lb" id="legend"></div>
    <div id="area"></div>
  </div>
</div>
<div class="tip" id="tip"></div>
<div class="pop" id="pop"></div>
<script>
// ══════════════════════════════════════════════════════════
// INFO REGISTRY
// ══════════════════════════════════════════════════════════
const I={
inflation:{t:"Inflation (IPC)",b:"Utilisé pour relativiser les performances en euros constants. N'affecte pas les flux nominaux calculés."},
regime:{t:"Régime fiscal locatif",b:"<b>LMNP Réel</b> : amortissements déductibles (bien + travaux).<br><b>Micro-BIC</b> : abattement 50%.<br><b>Foncier nu réel</b> : charges réelles, sans amortissement."},
tauxActu:{t:"Taux d'actualisation (VAN)",b:"Taux utilisé pour calculer la Valeur Actuelle Nette. Représente le coût d'opportunité du capital — typiquement le rendement attendu d'un placement alternatif."},
rendAlt:{t:"Rendement placement alternatif",b:"Rendement annuel moyen du placement financier (ETF/bourse) utilisé dans le scénario 'Louer + Investir'. Historiquement ~7-8% brut pour un ETF World sur longue période, ~5-6% net après impôts et inflation."},
prixAchat:{t:"Prix d'achat net vendeur",b:"Prix payé au vendeur, hors frais.",code:"Rendement brut = Loyer×12 / Coût total"},
fraisNotaire:{t:"Frais de notaire",b:"7-8% dans l'ancien, 2-3% dans le neuf."},
travaux:{t:"Travaux de rénovation",b:"En LMNP Réel, amortissables sur plusieurs années.",code:"Amort. travaux = Travaux × Taux amort."},
fraisAgence:{t:"Frais d'agence acheteur",b:"Honoraires d'agence à charge de l'acheteur."},
apport:{t:"Apport personnel",b:"Capital propre investi. Réduit le montant emprunté mais aussi le levier."},
taux:{t:"Taux d'intérêt nominal",b:"Taux nominal du prêt.",code:"Mensualité = K×(τ/12)/(1−(1+τ/12)^−n)"},
duree:{t:"Durée du prêt",b:"Plus long = mensualité plus faible mais coût total plus élevé."},
assurance:{t:"Assurance emprunteur (ADI)",b:"0.10-0.40%/an du capital selon profil.",code:"Assurance mens. = Capital × taux / 12"},
revalBien:{t:"Revalorisation du bien",b:"Hypothèse de hausse annuelle. ~2-3%/an historique en France.",code:"Valeur an N = Prix × (1+taux)^N"},
fraisVente:{t:"Frais d'agence vente",b:"3-7% du prix de vente. Négociable ou évitable en PAP."},
loyer:{t:"Loyer mensuel brut",b:"Hors charges récupérables. Levier n°1 de la rentabilité.",code:"Rdt brut = Loyer×12 / Coût total"},
vacance:{t:"Vacance locative",b:"5-8% en zone tendue, 10-15% en zone rurale.",code:"Loyer encaissé = Loyer brut × (1−vacance)"},
taxeFonciere:{t:"Taxe foncière",b:"Impôt local annuel. Varie fortement selon la commune."},
chargesCopro:{t:"Charges copro non récupérables",b:"Restent à charge du propriétaire."},
assurPNO:{t:"Assurance PNO",b:"Obligatoire en copropriété. 100-300€/an."},
fraisGestion:{t:"Gestion locative",b:"6-9% TTC des loyers encaissés si agence."},
provision:{t:"Provision travaux",b:"Épargne de précaution. Règle : ~1% valeur/an."},
revalLoyer:{t:"Revalorisation loyer",b:"Plafonnée à l'IRL. 1-4%/an selon inflation.",code:"Loyer an N = Loyer × (1+taux)^(N−1)"},
tmi:{t:"TMI",b:"Tranche marginale : 0%, 11%, 30%, 41% ou 45%.",code:"Impôts = Rev. imposable × (TMI+PS)"},
ps:{t:"Prélèvements sociaux",b:"17.2% sur les revenus fonciers (CSG+CRDS+solidarité)."},
amortBien:{t:"Amortissement bien",b:"LMNP Réel uniquement. Typique 25-40 ans → 2.5-4%/an."},
amortTravaux:{t:"Amortissement travaux",b:"LMNP Réel. Typique 7-10 ans → 10-14%/an."},
impotPV:{t:"Impôt plus-value",b:"19% IR + 17.2% PS = 36.2%. Abattements progressifs. RP exonérée."},
psPV:{t:"PS sur plus-value",b:"17.2%. Exonération totale après 30 ans."},
loyerActuel:{t:"Loyer actuel (que vous payez)",b:"Le loyer que vous payez comme locataire aujourd'hui. C'est l'économie réalisée si vous achetez votre RP.",code:"Économie mensuelle = Loyer actuel − Mensualité"},
revalLoyerRP:{t:"Revalorisation loyer marché",b:"Hausse annuelle de votre loyer actuel si vous continuez à louer. Sert à projeter l'économie future de la RP."},
assurHab:{t:"Assurance habitation",b:"Assurance multirisque habitation propriétaire occupant. 200-500€/an."},
chargesCoproRP:{t:"Charges copropriété RP",b:"Totalité des charges (pas de distinction récupérable/non). 50-200€/mois."},
taxeFonciereRP:{t:"Taxe foncière RP",b:"Même impôt que pour un locatif. Pas de taxe d'habitation depuis 2023 pour les RP."},
provisionRP:{t:"Provision travaux RP",b:"Budget annuel pour l'entretien. ~1% de la valeur du bien."},
};

// ══════════════════════════════════════════════════════════
// GLOBALS
// ══════════════════════════════════════════════════════════
const G={inflation:2,regime:'lmnp',horizon:20,tauxActu:3,rendAlt:6};
const COL={A:'#6C9AFF',B:'#FF9D5C',C:'#5CEFB0'};
const KEYS=['A','B','C'];

function mkDef(mode){
  return{
    mode, // 'loc' or 'rp'
    enabled:true,
    label:mode==='loc'?'Locatif':'Résidence principale',
    prixAchat:250000,fraisNotaire:20000,travaux:15000,fraisAgence:0,apport:50000,
    taux:3.85,duree:20,assurance:0.25,
    revalBien:2.0,fraisVente:4,
    // LOC only
    loyer:1000,vacance:5,taxeFonciere:1200,chargesCopro:800,assurPNO:200,
    fraisGestion:7,provision:500,revalLoyer:1.5,
    tmi:30,ps:17.2,amortBien:2.5,amortTravaux:10,
    impotPV:19,psPV:17.2,
    // RP only
    loyerActuel:900,taxeFonciereRP:1200,chargesCoproRP:1200,assurHab:300,
    provisionRP:500,revalLoyerRP:2,
  };
}
const sims={
  A:{...mkDef('loc'),label:'Locatif — Centre-ville',prixAchat:280000,fraisNotaire:22000,loyer:1050,apport:60000},
  B:{...mkDef('rp'),label:'RP — Achat appart',prixAchat:320000,fraisNotaire:25000,apport:70000,loyerActuel:1100},
  C:{...mkDef('loc'),label:'Locatif — Périphérie',prixAchat:180000,fraisNotaire:14000,loyer:750,apport:35000,taux:3.5,duree:15},
};
let curTab='charts';
const openGrp={A:'Acquisition',B:'Acquisition',C:'Acquisition'};

// ══════════════════════════════════════════════════════════
// COMPUTE
// ══════════════════════════════════════════════════════════
function compute(p){
  const ct=p.prixAchat+p.fraisNotaire+p.travaux+p.fraisAgence;
  const emp=Math.max(0,ct-p.apport);
  const tM=(p.taux/100)/12, nM=p.duree*12;
  const mens=emp>0&&tM>0?emp*tM/(1-Math.pow(1+tM,-nM)):(emp>0?emp/nM:0);
  const assM=emp*(p.assurance/100)/12;

  const amort=[];let cap=emp;
  for(let m=1;m<=Math.max(nM,12);m++){
    const inter=cap*tM,capM=Math.max(0,mens-inter);
    cap=Math.max(0,cap-capM);amort.push({inter,cap:capM,assur:assM,rest:cap});
  }

  function impLoc(le,chg,ab,at,tmi,ps){
    let ri;
    if(G.regime==='lmnp')ri=Math.max(0,le-chg-ab-at);
    else if(G.regime==='microbic')ri=Math.max(0,le*.5);
    else ri=Math.max(0,le-chg);
    return ri*((tmi+ps)/100);
  }

  const ab=p.prixAchat*(p.amortBien/100),at=p.travaux*(p.amortTravaux/100);
  const flux=[];let cfC=0;
  // IRR cashflows: initial = -apport, then annual CF, last year += revente net
  const irrFlows=[-p.apport];

  for(let yr=1;yr<=30;yr++){
    const mi=Math.min(yr*12,amort.length)-1;
    const rest=amort[mi]?.rest??0;
    const ann=yr<=p.duree?mens*12:0,asp=yr<=p.duree?assM*12:0;
    const vb=p.prixAchat*Math.pow(1+p.revalBien/100,yr);

    let cfN,le=0,chg=0,imp=0;

    if(p.mode==='loc'){
      const lb=p.loyer*12*Math.pow(1+p.revalLoyer/100,yr-1);
      le=lb*(1-p.vacance/100);
      chg=p.taxeFonciere+p.chargesCopro+p.assurPNO+p.provision+lb*(p.fraisGestion/100);
      imp=impLoc(le,chg,ab,at,p.tmi,p.ps);
      cfN=le-chg-ann-asp-imp;
    } else {
      // RP: "revenu" = loyer économisé, charges = taxe foncière + copro + assur + provision
      const loyerEcon=p.loyerActuel*12*Math.pow(1+p.revalLoyerRP/100,yr-1);
      chg=p.taxeFonciereRP+p.chargesCoproRP+p.assurHab+p.provisionRP;
      cfN=loyerEcon-chg-ann-asp; // no tax on RP
      le=loyerEcon;
    }
    cfC+=cfN;

    // Revente
    const pr=(p.prixAchat+p.travaux)*Math.pow(1+p.revalBien/100,yr);
    const fa=pr*(p.fraisVente/100);
    const pvB=Math.max(0,pr-p.prixAchat-p.travaux);
    let iPV=0;
    if(p.mode==='loc') iPV=pvB*((p.impotPV+p.psPV)/100); // RP: exonérée
    const reventeNet=pr-rest-fa-iPV;
    const bilanRevente=reventeNet+cfC-p.apport;

    flux.push({yr,le,chg,ann:ann+asp,imp,cfN,cfC,vb,rest,
      patNet:vb-rest+cfC-p.apport,
      reventeNet,bilanRevente,pr});

    irrFlows.push(cfN);
  }

  // Compute TRI at horizons by adding revente net to last flow
  function calcTRI(horizon){
    if(horizon>30||horizon<1)return null;
    const flows=[...irrFlows.slice(0,horizon+1)];
    flows[horizon]+=flux[horizon-1].reventeNet;
    return irr(flows);
  }

  const totInt=amort.reduce((s,m)=>s+m.inter,0);
  const totAss=amort.reduce((s,m)=>s+m.assur,0);
  const rendBrut=p.mode==='loc'?(p.loyer*12/ct)*100:0;
  let rendNet=0;
  if(p.mode==='loc'){
    const lnA=p.loyer*(1-p.vacance/100)*12-(p.taxeFonciere+p.chargesCopro+p.assurPNO+p.provision+p.loyer*12*(p.fraisGestion/100));
    rendNet=(lnA/ct)*100;
  }
  const cfM=p.mode==='loc'?p.loyer-mens-assM:p.loyerActuel-mens-assM;
  const be=flux.findIndex(f=>f.cfC>=0);

  // Scénario "Louer + Investir" (only for RP mode)
  let altFinancier=null;
  if(p.mode==='rp'){
    const r=G.rendAlt/100;
    const mensualiteRP=mens+assM;
    const loyerActuelMensuel=p.loyerActuel;
    altFinancier=[];
    let capFin=p.apport; // apport investi dès le départ
    let totalInvesti=p.apport;
    let loyersCumules=0;
    for(let yr=1;yr<=30;yr++){
      // Chaque mois de l'année
      for(let m=0;m<12;m++){
        const loyerMois=p.loyerActuel*Math.pow(1+p.revalLoyerRP/100,(yr-1));
        loyersCumules+=loyerMois;
        // Delta = mensualité RP - loyer actuel : si positif, on investit la différence
        const delta=Math.max(0,mensualiteRP-loyerMois);
        capFin=capFin*(1+r/12)+delta;
        totalInvesti+=delta;
      }
      const loyerAnnuel=p.loyerActuel*12*Math.pow(1+p.revalLoyerRP/100,yr-1);
      altFinancier.push({yr,capFin,loyersCumules,totalInvesti,
        patrimoineNet:capFin, // pas de dette, le loyer est un coût opérationnel
      });
    }
  }

  // VAN
  function calcVAN(horizon){
    const r=G.tauxActu/100;
    let van=-p.apport;
    for(let t=1;t<=horizon&&t<=30;t++){
      let cf=flux[t-1].cfN;
      if(t===horizon)cf+=flux[t-1].reventeNet;
      van+=cf/Math.pow(1+r,t);
    }
    return van;
  }

  return{ct,emp,mens,assM,totInt,totAss,rendBrut,rendNet,cfM,
    be:be>=0?be+1:null,flux,amort,altFinancier,
    tri10:calcTRI(10),tri15:calcTRI(15),tri20:calcTRI(20),
    van:calcVAN(G.horizon),
    moic:flux[G.horizon-1]?(flux[G.horizon-1].bilanRevente+p.apport)/p.apport:0,
    revente:flux.map(f=>({yr:f.yr,pr:f.pr,rest:f.rest,bilanRevente:f.bilanRevente})),
  };
}

// Newton-Raphson IRR
function irr(flows,guess=0.1,maxIter=100,tol=1e-7){
  let r=guess;
  for(let i=0;i<maxIter;i++){
    let npv=0,dnpv=0;
    for(let t=0;t<flows.length;t++){
      const d=Math.pow(1+r,t);
      npv+=flows[t]/d;
      if(t>0)dnpv-=t*flows[t]/Math.pow(1+r,t+1);
    }
    if(Math.abs(dnpv)<1e-15)return null;
    const nr=r-npv/dnpv;
    if(Math.abs(nr-r)<tol)return nr;
    r=nr;
    if(!isFinite(r)||r<-1)return null;
  }
  return null;
}

// crossover year: when RP patrimoine > alt financier patrimoine
function crossoverYear(res){
  if(!res.altFinancier)return null;
  for(let i=0;i<30;i++){
    const rpPat=res.flux[i]?.patNet;
    const altPat=res.altFinancier[i]?.patrimoineNet;
    if(rpPat!=null&&altPat!=null&&rpPat>=altPat)return i+1;
  }
  return null;
}

function drawLine(id,datasets,xLabels){
  const el=document.getElementById(id);if(!el)return;
  const W=el.offsetWidth||600,H=parseInt(el.dataset.h)||220,dpr=devicePixelRatio||1;
  el.width=W*dpr;el.height=H*dpr;el.style.height=H+'px';
  const ctx=el.getContext('2d');ctx.scale(dpr,dpr);
  const p={l:60,r:14,t:12,b:26},cW=W-p.l-p.r,cH=H-p.t-p.b;
  const all=datasets.filter(d=>!d.hide).flatMap(d=>d.data.filter(v=>v!=null&&isFinite(v)));
  if(!all.length){ctx.fillStyle='#0f172a';ctx.fillRect(0,0,W,H);return;}
  let mn=Math.min(...all),mx=Math.max(...all);const rng=mx-mn||1;mn-=rng*.07;mx+=rng*.07;
  const xS=i=>p.l+(i/Math.max(xLabels.length-1,1))*cW;
  const yS=v=>p.t+cH-((v-mn)/(mx-mn))*cH;
  ctx.fillStyle='#0f172a';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#1e293b';ctx.lineWidth=1;
  for(let i=0;i<=5;i++){const y=p.t+(i/5)*cH;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(W-p.r,y);ctx.stroke();ctx.fillStyle='#4b5563';ctx.font="10px 'DM Sans',sans-serif";ctx.textAlign='right';ctx.fillText(fmtK(mx-(i/5)*(mx-mn)),p.l-4,y+3.5);}
  const step=Math.max(1,Math.ceil(xLabels.length/10));ctx.fillStyle='#4b5563';ctx.textAlign='center';
  xLabels.forEach((l,i)=>{if(i%step===0||i===xLabels.length-1)ctx.fillText(l,xS(i),H-5);});
  if(mn<0&&mx>0){const y0=yS(0);ctx.strokeStyle='#334155';ctx.lineWidth=1.5;ctx.setLineDash([5,3]);ctx.beginPath();ctx.moveTo(p.l,y0);ctx.lineTo(W-p.r,y0);ctx.stroke();ctx.setLineDash([]);}
  datasets.forEach(ds=>{
    if(ds.hide)return;
    ctx.strokeStyle=ds.color;ctx.lineWidth=ds.dashed?1.5:2.5;ctx.lineJoin='round';ctx.lineCap='round';
    if(ds.dashed)ctx.setLineDash([6,4]);else ctx.setLineDash([]);
    ctx.beginPath();let st=false;
    ds.data.forEach((v,i)=>{if(v==null||!isFinite(v))return;st?ctx.lineTo(xS(i),yS(v)):ctx.moveTo(xS(i),yS(v));st=true;});
    ctx.stroke();ctx.setLineDash([]);
  });
  el._meta={datasets,xLabels,xS,dpr,W};
}

function drawBars(id,datasets,xLabels,stacked){
  const el=document.getElementById(id);if(!el)return;
  const W=el.offsetWidth||600,H=parseInt(el.dataset.h)||200,dpr=devicePixelRatio||1;
  el.width=W*dpr;el.height=H*dpr;el.style.height=H+'px';
  const ctx=el.getContext('2d');ctx.scale(dpr,dpr);
  const p={l:60,r:14,t:12,b:26},cW=W-p.l-p.r,cH=H-p.t-p.b,n=xLabels.length,gW=cW/n;
  const vis=datasets.filter(d=>!d.hide);
  let mn=0,mx;
  if(stacked){mx=(Math.max(...xLabels.map((_,i)=>vis.reduce((s,d)=>s+(d.data[i]||0),0)))||1)*1.1;}
  else{const av=vis.flatMap(d=>d.data.filter(v=>isFinite(v)));mn=Math.min(0,...av)*1.1;mx=Math.max(0,...av)*1.1||1;}
  const rng=mx-mn||1,yS=v=>p.t+cH-((v-mn)/rng)*cH;
  ctx.fillStyle='#0f172a';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#1e293b';ctx.lineWidth=1;
  for(let i=0;i<=5;i++){const y=p.t+(i/5)*cH;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(W-p.r,y);ctx.stroke();ctx.fillStyle='#4b5563';ctx.font="10px 'DM Sans',sans-serif";ctx.textAlign='right';ctx.fillText(fmtK(mx-(i/5)*rng),p.l-4,y+3.5);}
  const step=Math.max(1,Math.ceil(n/8));ctx.fillStyle='#4b5563';ctx.textAlign='center';
  xLabels.forEach((l,i)=>{if(i%step===0||i===n-1)ctx.fillText(l,p.l+(i+.5)*gW,H-5);});
  if(!stacked&&mn<0){ctx.strokeStyle='#334155';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(p.l,yS(0));ctx.lineTo(W-p.r,yS(0));ctx.stroke();}
  if(stacked){xLabels.forEach((_,i)=>{let base=0;vis.forEach(ds=>{const v=ds.data[i]||0,x=p.l+i*gW+gW*.08,bW=gW*.84,y=yS(base+v),h=Math.max(0,yS(base)-yS(base+v));if(h>.5){ctx.fillStyle=ds.color;ctx.beginPath();ctx.roundRect(x,y,bW,h,[0]);ctx.fill();}base+=v;});});}
  else{const nD=vis.length,bW=Math.min(gW*.72/nD,15);xLabels.forEach((_,i)=>{vis.forEach((ds,di)=>{const v=ds.data[i];if(v==null||!isFinite(v))return;const x=p.l+(i+.05)*gW+di*bW+(gW*.9-nD*bW)/2,y=v>=0?yS(v):yS(0),h=Math.max(1,Math.abs(yS(0)-yS(v)));ctx.fillStyle=ds.color;ctx.beginPath();ctx.roundRect(x,y,bW,h,[v>=0?2:0,v>=0?2:0,v<0?2:0,v<0?2:0]);ctx.fill();});});}
  el._meta={datasets:vis,xLabels,xS:i=>p.l+(i+.5)*gW,dpr,W};
}

function attachHover(id,names){

    let bi=0,bd=1e9;m.xLabels.forEach((_,i)=>{const dx=Math.abs(m.xS(i)*(rect.width/m.W)-cx);if(dx<bd){bd=dx;bi=i;}});

    <div class="gd"></div>
    <div class="gf"><span class="gl">Taux actualisation (VAN)</span><button class="ib" data-info="tauxActu">?</button><input class="gi" type="number" min="0" max="15" step="0.5" value="${G.tauxActu}" oninput="G.tauxActu=+this.value;scheduleRedraw()"><span class="gu">%</span></div>
    <div class="gd"></div>
    <div class="gf"><span class="gl">Rdt placement alternatif (net)</span><button class="ib" data-info="rendAlt">?</button><input class="gi" type="number" min="0" max="20" step="0.5" value="${G.rendAlt}" oninput="G.rendAlt=+this.value;scheduleRedraw()"><span class="gu">%</span></div>
  `;
}

const TAB_DEFS=[
  ['charts','📉 Graphiques'],['kpis','🎯 Comparaison'],
  ['revente','🏷️ Revente'],['amort','💳 Amortissement']
];
function buildTabs(){
  document.getElementById('tabs').innerHTML=TAB_DEFS.map(([id,lbl])=>`<button class="tab${curTab===id?' active':''}" onclick="setTab('${id}')">${lbl}</button>`).join('');
}
function setTab(t){curTab=t;buildTabs();rebuildShell();scheduleRedraw();}

function renderLegend(){
  let h='';
  KEYS.forEach(k=>{
    const p=sims[k],col=COL[k],on=p.enabled;
    const modeTag=p.mode==='loc'?'📊':'🏡';
    h+=`<div class="li${on?'':' off'}" onclick="togSim('${k}',${!on})" title="Cliquer pour ${on?'masquer':'afficher'}">
      <div class="ll" style="background:${on?col:'#475569'}"></div>
      <span style="color:${on?col:'#475569'}">${modeTag} ${p.label}</span>
    </div>`;
    // For RP mode, also show the alt line
    if(p.mode==='rp'&&on){
      h+=`<div class="li" style="cursor:default"><div class="ll" style="background:${col};opacity:.4;border:1px dashed ${col}"></div><span style="color:${col};opacity:.5;font-size:10px">Louer+Investir (${p.label})</span></div>`;
    }
  });
  h+=`<span style="font-size:9px;color:var(--muted);margin-left:auto">Cliquer pour masquer/afficher</span>`;
  document.getElementById('legend').innerHTML=h;
}

// ══════════════════════════════════════════════════════════
// SHELL — recreated on tab change only
// ══════════════════════════════════════════════════════════
function rebuildShell(){
  const area=document.getElementById('area');
  if(curTab==='charts'){
    area.innerHTML=`
      <div class="cc"><div class="ct">💰 Cash-flow cumulé / Patrimoine financier — 30 ans</div>
        <div class="cs">Pour le locatif : somme des CF nets annuels. Pour la RP : économie de loyer − charges − mensualité. Les courbes en pointillés montrent le scénario alternatif "Louer + Investir" pour les simulations RP.</div>
        <canvas id="c1" data-h="230"></canvas></div>
      <div class="cc" style="margin-top:10px"><div class="ct">🏦 Patrimoine net — 30 ans</div>
        <div class="cs">Locatif : valeur bien − dette + CF cumulé − apport. RP : idem + PV exonérée. Pointillés : capital financier du scénario "Louer + Investir".</div>
        <canvas id="c2" data-h="230"></canvas></div>
      <div class="cc" style="margin-top:10px"><div class="ct">📊 Cash-flow net annuel (après impôts)</div>
        <div class="cs">Le saut en fin de prêt est <strong>normal</strong> : les mensualités s'arrêtent, le CF bondit du montant de l'annuité disparue.</div>
        <canvas id="c3" data-h="200"></canvas></div>
      <div class="cc" style="margin-top:10px"><div class="ct">📈 Valeur du bien dans le temps</div>
        <div class="cs">Valeur de marché estimée selon le taux de revalorisation paramétré.</div>
        <canvas id="c4" data-h="190"></canvas></div>`;
  } else if(curTab==='kpis'){
    area.innerHTML=`<div class="cc" id="kpi-card"></div>`;
  } else if(curTab==='revente'){
    area.innerHTML=`<div class="cc"><div class="ct">🏷️ Bilan net selon l'année de revente</div>
      <div class="cs">Gain total en poche si vous revendez cette année-là. RP exonérée d'impôt sur PV. Les pointillés montrent le scénario "Louer + Investir" pour les RP.</div>
      <canvas id="cr" data-h="260"></canvas></div>
    <div class="cc" style="margin-top:10px"><div class="ct">📋 Détail par année clé</div><div id="rev-t"></div></div>`;
  } else if(curTab==='amort'){
    area.innerHTML=`<div class="cc"><div class="ct">💳 Décomposition annuelle du prêt</div>
      <div class="cs">Au début la majorité part en intérêts, puis la part en capital augmente progressivement.</div>
      <div id="am-cards"></div></div>
    <div class="cc" style="margin-top:10px"><div class="ct">📉 Capital restant dû</div><canvas id="amcap" data-h="220"></canvas></div>`;
    // Build per-sim canvases
    let h='';KEYS.filter(k=>sims[k].enabled).forEach(k=>{
      h+=`<div style="margin-bottom:14px"><div style="font-size:11px;font-weight:700;color:${COL[k]};margin-bottom:4px">● ${sims[k].label}</div>
      <div class="am-lg"><span><span class="am-d" style="background:var(--green)"></span>Capital</span><span><span class="am-d" style="background:var(--red)"></span>Intérêts</span><span><span class="am-d" style="background:var(--yellow)"></span>Assurance</span></div>
      <canvas id="am${k}" data-h="120"></canvas></div>`;
    });
    document.getElementById('am-cards').innerHTML=h;
  }
}

// ══════════════════════════════════════════════════════════
// REDRAW — only canvas + dynamic table content
// ══════════════════════════════════════════════════════════
let _raf=null;
function scheduleRedraw(){if(_raf)cancelAnimationFrame(_raf);_raf=requestAnimationFrame(redraw);}

function redraw(){
  _raf=null;
  const RES={};KEYS.forEach(k=>RES[k]=compute(sims[k]));
  const yrs=Array.from({length:30},(_,i)=>i+1);
  const names=KEYS.map(k=>sims[k].label);
  const enabled=k=>sims[k].enabled;
  const hide=k=>!sims[k].enabled;

  if(curTab==='charts'){
    // Chart 1: CF cumulé + alt financier (dashed)
    let ds1=[];
    KEYS.forEach(k=>{
      ds1.push({color:COL[k],data:yrs.map(i=>RES[k].flux[i-1]?.cfC),hide:hide(k),label:sims[k].label});
      if(sims[k].mode==='rp'&&RES[k].altFinancier){
        ds1.push({color:COL[k],data:yrs.map(i=>RES[k].altFinancier[i-1]?.patrimoineNet-sims[k].apport),hide:hide(k),dashed:true,label:`Louer+Investir (${sims[k].label})`});
      }
    });
    drawLine('c1',ds1,yrs);attachHover('c1',ds1.map(d=>d.label));

    // Chart 2: Patrimoine net + alt financier
    let ds2=[];
    KEYS.forEach(k=>{
      ds2.push({color:COL[k],data:yrs.map(i=>RES[k].flux[i-1]?.patNet),hide:hide(k),label:sims[k].label});
      if(sims[k].mode==='rp'&&RES[k].altFinancier){
        ds2.push({color:COL[k],data:yrs.map(i=>RES[k].altFinancier[i-1]?.patrimoineNet),hide:hide(k),dashed:true,label:`Louer+Investir (${sims[k].label})`});
      }
    });
    drawLine('c2',ds2,yrs);attachHover('c2',ds2.map(d=>d.label));

    // Chart 3: CF net annuel (bars)
    const ds3=KEYS.map(k=>({color:COL[k],data:yrs.map(i=>RES[k].flux[i-1]?.cfN),hide:hide(k),label:sims[k].label}));
    drawBars('c3',ds3,yrs,false);attachHover('c3',names);

    // Chart 4: Valeur du bien
    const ds4=KEYS.map(k=>({color:COL[k],data:yrs.map(i=>RES[k].flux[i-1]?.vb),hide:hide(k),label:sims[k].label}));
    drawLine('c4',ds4,yrs);attachHover('c4',names);
  }

  else if(curTab==='kpis'){
    const regime={'lmnp':'LMNP Réel','microbic':'Micro-BIC','nu':'Foncier nu'}[G.regime];
    const rows=[
      ["Type",k=>sims[k].mode==='loc'?'📊 Locatif':'🏡 RP'],
      ["Coût total acq.",k=>fmtE(RES[k].ct)],
      ["Montant emprunté",k=>fmtE(RES[k].emp)],
      ["Mensualité + assurance",k=>fmtE(RES[k].mens+RES[k].assM)],
      ["Coût total crédit",k=>fmtE(RES[k].totInt+RES[k].totAss)],
      ...(KEYS.some(k=>sims[k].mode==='loc')?[
        ["Rendement brut (loc.)",k=>sims[k].mode==='loc'?fmtP(RES[k].rendBrut):'—'],
        ["Rendement net (loc.)",k=>sims[k].mode==='loc'?fmtP(RES[k].rendNet):'—'],
        ["CF mensuel brut",k=>fmtE(RES[k].cfM)],
      ]:[]),
      ...(KEYS.some(k=>sims[k].mode==='rp')?[
        ["Effort mensuel (RP)",k=>sims[k].mode==='rp'?fmtE(RES[k].mens+RES[k].assM-sims[k].loyerActuel):'—'],
        ["Point de croisement (RP)",k=>sims[k].mode==='rp'?(()=>{const c=crossoverYear(RES[k]);return c?`Année ${c}`:'> 30 ans';})():'—'],
      ]:[]),
      ["Breakeven CF cumulé",k=>RES[k].be?`An ${RES[k].be}`:'> 30 ans'],
      [`TRI ${G.horizon} ans`,k=>fmtTRI(RES[k][`tri${G.horizon}`]||compute({...sims[k]}).flux.length>=G.horizon?calcTRIFromRes(RES[k],G.horizon):null)],
      ["TRI 10 ans",k=>fmtTRI(RES[k].tri10)],
      ["TRI 20 ans",k=>fmtTRI(RES[k].tri20)],
      [`VAN (${G.tauxActu}%, ${G.horizon}a)`,k=>fmtE(RES[k].van)],
      [`MOIC ${G.horizon} ans`,k=>RES[k].moic?RES[k].moic.toFixed(2)+'×':'—'],
      [`Patrimoine net ${G.horizon} ans`,k=>fmtE(RES[k].flux[G.horizon-1]?.patNet)],
      ["Patrimoine net 30 ans",k=>fmtE(RES[k].flux[29]?.patNet)],
      ...(KEYS.some(k=>sims[k].mode==='rp')?[
        [`Alt. Louer+Investir ${G.horizon}a`,k=>sims[k].mode==='rp'&&RES[k].altFinancier?fmtE(RES[k].altFinancier[G.horizon-1]?.patrimoineNet):'—'],
        [`Avantage RP vs Louer ${G.horizon}a`,k=>{if(sims[k].mode!=='rp'||!RES[k].altFinancier)return'—';const rp=RES[k].flux[G.horizon-1]?.patNet;const alt=RES[k].altFinancier[G.horizon-1]?.patrimoineNet;return fmtE(rp-alt);}],
      ]:[]),
    ];

    let tbody='';rows.forEach(([lbl,vFn])=>{tbody+=`<tr><td class="td-lbl">${lbl}</td>`;KEYS.forEach(k=>{const on=sims[k].enabled;tbody+=`<td class="tr" style="color:${on?COL[k]:'#475569'}">${on?vFn(k):'—'}</td>`;});tbody+=`</tr>`;});
    document.getElementById('kpi-card').innerHTML=`
      <div class="ct">🎯 Tableau comparatif — Régime locatif : <span style="color:#fbbf24">${regime}</span></div>
      <div class="cs">Survolez les lignes pour une explication. Le TRI intègre les flux réels + le produit net de revente.</div>
      <table><thead><tr><th>Indicateur</th>${KEYS.map(k=>`<th style="text-align:right;color:${COL[k]}">${sims[k].label}</th>`).join('')}</tr></thead><tbody>${tbody}</tbody></table>`;
  }

  else if(curTab==='revente'){
    let ds=[];
    KEYS.forEach(k=>{
      ds.push({color:COL[k],data:yrs.map(i=>RES[k].flux[i-1]?.bilanRevente),hide:hide(k),label:sims[k].label});
      if(sims[k].mode==='rp'&&RES[k].altFinancier&&sims[k].enabled){
        ds.push({color:COL[k],data:yrs.map(i=>RES[k].altFinancier[i-1]?.patrimoineNet-sims[k].apport),hide:hide(k),dashed:true,label:`Louer+Investir (${sims[k].label})`});
      }
    });
    drawLine('cr',ds,yrs);attachHover('cr',ds.map(d=>d.label));

    let rows='';
    [5,10,15,20,25,30].forEach(yr=>{
      rows+=`<div class="rg"><div class="yb">Yr ${yr}</div>`;
      KEYS.forEach(k=>{
        if(!sims[k].enabled){rows+=`<div class="rc" style="background:#1118;padding:6px 8px;font-size:10px;color:#475569">Désactivé</div>`;return;}
        const f=RES[k].flux[yr-1],col=COL[k],pos=(f?.bilanRevente||0)>=0;
        rows+=`<div class="rc" style="background:${col}0f;border:1px solid ${col}28">
          <div style="font-size:9px;font-weight:700;color:${col};margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px">${sims[k].mode==='loc'?'📊':'🏡'} ${sims[k].label}</div>
          <div style="font-size:10px">Revente : <b>${fmtK(f?.pr)}</b></div>
          <div style="font-size:10px">Capital restant : <b style="color:var(--red)">${fmtK(f?.rest)}</b></div>
          <div style="font-size:10px;color:${pos?'var(--green)':'var(--red)'}">Bilan : <b>${fmtK(f?.bilanRevente)}</b></div>
        </div>`;
      });
      rows+=`</div>`;
    });
    document.getElementById('rev-t').innerHTML=rows;
  }

  else if(curTab==='amort'){
    const YRS=[1,3,5,7,10,12,15,18,20];
    KEYS.filter(k=>sims[k].enabled).forEach(k=>{
      const res=RES[k];
      const capA=YRS.map(yr=>{const s=(yr-1)*12,e=Math.min(yr*12,res.amort.length);return res.amort.slice(s,e).reduce((a,m)=>a+m.cap,0);});
      const intA=YRS.map(yr=>{const s=(yr-1)*12,e=Math.min(yr*12,res.amort.length);return res.amort.slice(s,e).reduce((a,m)=>a+m.inter,0);});
      const assA=YRS.map(yr=>{const s=(yr-1)*12,e=Math.min(yr*12,res.amort.length);return res.amort.slice(s,e).reduce((a,m)=>a+m.assur,0);});
      drawBars(`am${k}`,[{color:'#4ade80',data:capA},{color:'#f87171',data:intA},{color:'#fbbf24',data:assA}],YRS.map(y=>`An ${y}`),true);
    });
    const dsCap=KEYS.map(k=>({color:COL[k],data:yrs.map(i=>RES[k].flux[i-1]?.rest),hide:hide(k),label:sims[k].label}));
    drawLine('amcap',dsCap,yrs);attachHover('amcap',names);
  }
}

function calcTRIFromRes(res,h){
  if(h>30||h<1||!res.flux[h-1])return null;
  const flows=[-res.flux[0]?.le?0:0]; // placeholder, use compute's TRI instead
  return res[`tri${h}`]||null;
}

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
window.addEventListener('resize',()=>{clearTimeout(window._rt);window._rt=setTimeout(()=>{rebuildShell();scheduleRedraw();},120);});

buildGS();buildTabs();renderLegend();
KEYS.forEach(k=>renderPanel(k));
rebuildShell();
scheduleRedraw();
</script>
</body>
</html>
